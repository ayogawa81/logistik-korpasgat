<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kodal Logistik KORPASGAT</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body { margin: 0; padding: 0; display: flex; height: 100vh; background: #000; overflow: hidden; color: #fff; }
        #sidebar { width: 380px; background: #001f3f; border-right: 3px solid #ff851b; z-index: 2000; display: flex; flex-direction: column; }
        .header { background: #002d5a; padding: 15px; text-align: center; border-bottom: 3px solid #ff851b; }
        #clock { font-size: 2rem; color: #00ff00; font-family: monospace; }
        
        .form-container { padding: 15px; flex: 1; overflow-y: auto; }
        .field { margin-bottom: 12px; }
        label { display: block; font-size: 10px; color: #8cb4d6; font-weight: bold; margin-bottom: 4px; }
        input, select { width: 100%; padding: 10px; background: #001224; border: 1px solid #ff851b; color: white; font-weight: bold; }
        
        .btn-aktivasi { width: 100%; padding: 15px; background: #ff851b; color: white; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; }
        
        #map { flex: 1; background: #011425; }

        /* Style Pesawat Agar Selalu Di Atas */
        .plane-marker { z-index: 1000 !important; }
        .plane-div { text-align: center; width: 60px !important; }
        .plane-label { background: rgba(0, 255, 0, 0.9); color: black; padding: 1px 4px; border-radius: 3px; font-size: 10px; font-weight: bold; display: inline-block; white-space: nowrap; margin-bottom: 2px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="header">
            <h2 style="margin:0; font-size:0.9rem; color:#ff851b;">KODAL LOGISTIK KORPASGAT</h2>
            <div id="clock">00:00:00</div>
        </div>
        <div class="form-container">
            <div class="field"><label>MISI / MUATAN</label><input type="text" id="misi" value="AMUNISI"></div>
            <div class="field"><label>POB (PERSONEL)</label><input type="text" id="pob" value="ANAS"></div>
            <div class="field"><label>PESAWAT</label><input type="text" id="pesawat" value="A-1234"></div>
            <div class="field"><label>RUTE ASAL</label><select id="asal"></select></div>
            <div class="field"><label>RUTE TUJUAN</label><select id="tujuan"></select></div>
            <button class="btn-aktivasi" onclick="kirimMisi()">🚀 AKTIVASI MISI RADAR</button>
        </div>
        <div id="log" style="padding:10px; background:#00142a; font-size:11px;"></div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Konfigurasi Firebase Anda
        const firebaseConfig = {
            apiKey: "AIzaSyBifnBivkGMG827wJGXhIDtjZ5EHNNtLp8",
            authDomain: "kodal-logistik-korpasgat.firebaseapp.com",
            projectId: "kodal-logistik-korpasgat",
            databaseURL: "https://kodal-logistik-korpasgat-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Setup Peta
        const map = L.map('map', { zoomControl: false }).setView([-2.5, 118], 5);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        const pangkalan = [
            { name: "Lanud HLP (Jakarta)", lat: -6.265, lng: 106.890 },
            { name: "Lanud DMB (Balikpapan)", lat: -1.268, lng: 116.894 },
            { name: "Lanud HND (Makassar)", lat: -5.061, lng: 119.553 }
        ];

        let activeLayers = {};

        // Listener Real-time
        db.ref('misi_radar').on('value', (snap) => {
            const data = snap.val();
            // Hapus semua marker lama sebelum gambar ulang
            Object.values(activeLayers).forEach(obj => { map.removeLayer(obj.m); map.removeLayer(obj.p); });
            activeLayers = {};

            if (data) {
                Object.keys(data).forEach(id => {
                    const val = data[id];
                    
                    // Gambar Garis RUTE
                    const path = L.polyline([[val.lat, val.lng], [val.dLat, val.dLng]], {
                        color: '#00ff00', weight: 2, dashArray: '5, 10'
                    }).addTo(map);

                    // Gambar VEKTOR PESAWAT
                    const planeIcon = L.divIcon({
                        className: 'plane-marker',
                        html: `<div class="plane-div">
                                <div class="plane-label">${val.pesawat}</div>
                                <i class="fa-solid fa-plane" style="color:#00ff00; font-size:24px; text-shadow: 2px 2px #000;"></i>
                               </div>`,
                        iconSize: [60, 40], iconAnchor: [30, 20]
                    });

                    const marker = L.marker([val.lat, val.lng], { icon: planeIcon }).addTo(map);
                    activeLayers[id] = { m: marker, p: path };
                });
            }
        });

        function kirimMisi() {
            const a = document.getElementById('asal').value.split('|');
            const t = document.getElementById('tujuan').value.split('|');
            if(!a[0] || !t[0]) return alert("Pilih Rute!");

            const payload = {
                misi: document.getElementById('misi').value,
                pesawat: document.getElementById('pesawat').value,
                lat: parseFloat(a[0]), lng: parseFloat(a[1]),
                dLat: parseFloat(t[0]), dLng: parseFloat(t[1])
            };

            db.ref('misi_radar').push(payload);
            map.flyTo([payload.lat, payload.lng], 8); // Auto-focus ke pesawat baru
        }

        function init() {
            ['asal', 'tujuan'].forEach(id => {
                const sel = document.getElementById(id);
                sel.innerHTML = '<option value="">-- Pilih --</option>';
                pangkalan.forEach(p => sel.innerHTML += `<option value="${p.lat}|${p.lng}">${p.name}</option>`);
            });
            setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID'); }, 1000);
            setTimeout(() => map.invalidateSize(), 500);
        }
        init();
    </script>
</body>
</html>
