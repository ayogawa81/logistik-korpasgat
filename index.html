<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kodal Logistik KORPASGAT - Live Tracking Mode</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #000; color: white; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 460px; background: #001f3f; display: flex; flex-direction: column; border-right: 3px solid #ff851b; z-index: 1000; }
        #map-container { flex: 1; position: relative; background: #000; }
        #map { height: 100%; width: 100%; background: #011425; }

        .header { background: #002d5a; padding: 15px; text-align: center; border-bottom: 3px solid #ff851b; }
        .header h2 { margin: 0; font-size: 1.2rem; color: #ff851b; text-transform: uppercase; letter-spacing: 2px; }
        #date-live { font-size: 1rem; color: #fff; font-weight: bold; margin-top: 5px; }
        #clock-live { font-size: 2rem; font-weight: bold; font-family: monospace; color: #00ff00; text-shadow: 0 0 10px #00ff00; }

        .form-section { padding: 15px; background: #002244; overflow-y: auto; border-bottom: 1px solid #113355; flex-shrink: 0; max-height: 40vh; }
        .input-group { margin-bottom: 8px; display: flex; flex-direction: column; }
        .input-group label { font-size: 0.8rem; margin-bottom: 2px; color: #8cb4d6; font-weight: bold; }
        input, select { padding: 8px; font-size: 0.9rem; border-radius: 4px; border: 1px solid #ff851b; background: #001224; color: white; font-weight: bold; }
        input[type="file"] { font-size: 0.8rem; background: #001224; border: 1px dashed #ff851b; padding: 5px; cursor: pointer; }
        
        button.btn-tambah { background: #ff851b; color: white; border: none; padding: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 5px; border-radius: 4px; }

        .list-section { flex: 1; overflow-y: auto; padding: 10px; }
        
        /* HIGHLIGHT MISI SELESAI */
        .flight-card { background: #002d5a; border-left: 6px solid; padding: 15px; margin-bottom: 12px; border-radius: 8px; position: relative; border: 1px solid #113355; transition: 0.5s; }
        .flight-card.arrived { border-left-color: #00ff00 !important; background: #004d33 !important; border: 2px solid #00ff00; box-shadow: 0 0 15px rgba(0,255,0,0.3); }
        .success-label { display: none; color: #00ff00; font-weight: bold; font-size: 0.8rem; text-align: center; margin-top: 10px; text-transform: uppercase; }
        .flight-card.arrived .success-label { display: block; }

        .time-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 6px; }
        .time-value { font-size: 0.85rem; color: #fff; font-family: monospace; font-weight: bold; }

        /* LABEL BANDARA & PESAWAT */
        .lbl-start { color: #00ff00; font-weight: 900; text-shadow: 2px 2px 4px #000; font-size: 16px; white-space: nowrap; }
        .lbl-dest { color: #ff4500; font-weight: 900; text-shadow: 2px 2px 4px #000; font-size: 18px; white-space: nowrap; }

        .plane-wrapper { display: flex; flex-direction: column; align-items: center; position: relative; transition: all 0.5s linear; }
        .pilot-photo-map { width: 60px; height: 60px; border-radius: 50%; border: 3px solid #fff; object-fit: cover; }
        .serial-txt { color: #0f0; font-family: monospace; font-weight: bold; font-size: 1.3rem; text-shadow: 2px 2px 4px #000; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="header">
            <h2>KODAL LOGISTIK KORPASGAT</h2>
            <div id="date-live">-- --- ----</div>
            <div id="clock-live">00:00:00</div>
        </div>
        <div class="form-section">
            <input type="hidden" id="edit_fbId" value="">
            <div class="input-group"><label>Misi / Logistik</label><input type="text" id="inp_barang" placeholder="Amunisi"></div>
            <div class="input-group"><label>Personel On Board</label><input type="text" id="inp_kurir" placeholder="Nama Lengkap"></div>
            <div class="input-group"><label>Pesawat / No Seri</label><input type="text" id="inp_pesawat" placeholder="A-1301"></div>
            <div class="input-group"><label>Insert Foto</label><input type="file" id="inp_foto" accept="image/*"></div>
            <div class="input-group"><label>Take Off (WIB)</label><input type="datetime-local" id="inp_waktu"></div>
            
            <div class="input-group"><label>Asal</label><select id="inp_asal"></select></div>
            <div class="input-group"><label>Tujuan Akhir</label><select id="inp_tujuan"></select></div>
            
            <button class="btn-tambah" id="btn_submit" onclick="prosesTambahPenerbangan()">🚀 AKTIVASI MISI LIVE</button>
        </div>
        <div class="list-section" id="flight-list"></div>
    </div>

    <div id="map-container"><div id="map"></div></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // CONFIG FIREBASE (Sesuai milik Putri)
        const firebaseConfig = {
            apiKey: "AIzaSyBifnBivkGMG827wJGXhIDtjZ5EHNNtLp8",
            authDomain: "kodal-logistik-korpasgat.firebaseapp.com",
            projectId: "kodal-logistik-korpasgat",
            storageBucket: "kodal-logistik-korpasgat.firebasestorage.app",
            messagingSenderId: "533092732764",
            appId: "1:533092732764:web:ac77a04f83a12e69667b99",
            databaseURL: "https://kodal-logistik-korpasgat-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const map = L.map('map', { minZoom: 5 }).setView([-2.2, 118], 5);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        const daftarBandara = [
            { nama: "Jakarta (HLP)", lat: -6.2655, lng: 106.8906 },
            { nama: "Bandung (BDO)", lat: -6.9009, lng: 107.5768 },
            { nama: "Madiun (IWX)", lat: -7.6158, lng: 111.4338 },
            { nama: "Makassar (UPG)", lat: -5.0616, lng: 119.5539 },
            { nama: "Biak (BIK)", lat: -1.1911, lng: 136.1086 }
        ];

        let flights = [];

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; const dLat = (lat2-lat1)*Math.PI/180; const dLon = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        db.ref('misi_logistik').on('value', (snapshot) => {
            flights.forEach(f => { if(f.marker) map.removeLayer(f.marker); if(f.line) map.removeLayer(f.line); if(f.labels) f.labels.forEach(l => map.removeLayer(l)); });
            flights = [];
            const data = snapshot.val();
            if (data) {
                Object.keys(data).forEach(id => {
                    const f = data[id];
                    f.fbId = id;
                    f.depTime = new Date(f.depTimeStr);
                    f.eta = new Date(f.etaStr);
                    initFlightMarker(f);
                    flights.push(f);
                });
            }
            renderSidebar();
        });

        function initFlightMarker(f) {
            const markerHTML = `
                <div class="plane-wrapper" id="plane-${f.fbId}">
                    <div style="position:absolute; top:-100px; text-align:center; min-width:150px;">
                        <img src="${f.fotoUrl}" class="pilot-photo-map">
                        <div class="serial-txt">${f.pesawat}</div>
                    </div>
                    <svg viewBox="0 0 100 100" width="50" height="50" id="svg-${f.fbId}">
                        <path d="M50 5 L90 90 L50 70 L10 90 Z" fill="${f.warna}" stroke="#fff" stroke-width="3"/>
                    </svg>
                </div>`;

            f.marker = L.marker([f.rute[0].lat, f.rute[0].lng], {
                icon: L.divIcon({ html: markerHTML, className: 'p-marker', iconSize: [100, 100], iconAnchor: [50, 50] }),
                opacity: 0 
            }).addTo(map);

            f.line = L.polyline(f.rute.map(r=>[r.lat, r.lng]), {color: f.warna, weight: 2, dashArray: '5, 10'}).addTo(map);
            
            f.labels = f.rute.map((r, i) => L.marker([r.lat, r.lng], {
                icon: L.divIcon({ html: `<span class="${i===0?'lbl-start':'lbl-dest'}">${r.nama}</span>`, className: 'airport-label' })
            }).addTo(map));
        }

        async function prosesTambahPenerbangan() {
            const depTime = new Date(document.getElementById('inp_waktu').value);
            const asal = document.getElementById('inp_asal').value.split(',');
            const tujuan = document.getElementById('inp_tujuan').value.split(',');
            const rute = [{lat:parseFloat(asal[0]), lng:parseFloat(asal[1]), nama:asal[2]}, {lat:parseFloat(tujuan[0]), lng:parseFloat(tujuan[1]), nama:tujuan[2]}];
            
            const dist = calculateDistance(rute[0].lat, rute[0].lng, rute[1].lat, rute[1].lng);
            const hours = dist / 540;
            const eta = new Date(depTime.getTime() + (hours * 3600000));

            db.ref('misi_logistik').push({
                kurir: document.getElementById('inp_kurir').value,
                pesawat: document.getElementById('inp_pesawat').value,
                barang: document.getElementById('inp_barang').value,
                depTimeStr: depTime.toISOString(),
                etaStr: eta.toISOString(),
                status: "STANDBY",
                warna: '#'+Math.floor(Math.random()*16777215).toString(16),
                fotoUrl: "https://ui-avatars.com/api/?name="+document.getElementById('inp_kurir').value,
                rute, duration: `${Math.floor(hours)}j ${Math.round((hours%1)*60)}m`
            });
        }

        function renderSidebar() {
            const list = document.getElementById('flight-list'); list.innerHTML = "";
            [...flights].reverse().forEach(f => {
                list.innerHTML += `
                    <div class="flight-card" id="card-${f.fbId}" style="border-left-color:${f.warna}">
                        <div style="font-weight:bold; color:#ff851b;">${f.barang} - ${f.kurir}</div>
                        <div class="time-info-grid">
                            <div class="time-value">T/O: ${f.depTime.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div>
                            <div class="time-value">ETA: ${f.eta.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div>
                        </div>
                        <div class="success-label">✅ ARRIVED AT DESTINATION</div>
                    </div>`;
            });
        }

        // LOGIKA PERGERAKAN LIVE
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock-live').innerText = now.toLocaleTimeString('id-ID');
            document.getElementById('date-live').innerText = now.toLocaleDateString('id-ID', {day:'2-digit', month:'long', year:'numeric'});

            flights.forEach(f => {
                const card = document.getElementById(`card-${f.fbId}`);
                if (now < f.depTime) return; // Belum waktunya

                if (now >= f.eta) {
                    // SUDAH SAMPAI
                    f.marker.setLatLng([f.rute[1].lat, f.rute[1].lng]);
                    f.marker.setOpacity(1);
                    if(card) card.classList.add('arrived');
                } else {
                    // SEDANG BERGERAK (LIVE)
                    f.marker.setOpacity(1);
                    const totalDur = f.eta - f.depTime;
                    const elapsed = now - f.depTime;
                    const progress = elapsed / totalDur;

                    const currentLat = f.rute[0].lat + (f.rute[1].lat - f.rute[0].lat) * progress;
                    const currentLng = f.rute[0].lng + (f.rute[1].lng - f.rute[0].lng) * progress;
                    
                    f.marker.setLatLng([currentLat, currentLng]);

                    // Rotasi SVG sesuai arah
                    const svg = document.getElementById(`svg-${f.fbId}`);
                    if(svg) {
                        const angle = Math.atan2(f.rute[1].lng - f.rute[0].lng, f.rute[1].lat - f.rute[0].lat) * 180 / Math.PI;
                        svg.style.transform = `rotate(${angle}deg)`;
                    }
                }
            });
        }, 1000);

        function isiDropdown() {
            const ids = ['inp_asal', 'inp_tujuan'];
            ids.forEach(id => {
                const sel = document.getElementById(id);
                daftarBandara.forEach(b => { sel.innerHTML += `<option value="${b.lat},${b.lng},${b.nama}">${b.nama}</option>`; });
            });
        }
        isiDropdown();
    </script>
</body>
</html>
