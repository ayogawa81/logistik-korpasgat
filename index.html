<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kodal Logistik KORPASGAT - Command Center TNI AU</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #000; color: white; display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 460px; background: #001f3f; display: flex; flex-direction: column; border-right: 3px solid #ff851b; z-index: 1000; }
        #map-container { flex: 1; position: relative; background: #000; }
        #map { height: 100%; width: 100%; background: #011425; }

        .header { background: #002d5a; padding: 20px; text-align: center; border-bottom: 3px solid #ff851b; }
        .header h2 { margin: 0; font-size: 1.3rem; color: #ff851b; text-transform: uppercase; letter-spacing: 2px; }
        
        .live-info { margin-top: 10px; display: flex; flex-direction: column; gap: 5px; }
        #clock-live { font-size: 2.2rem; font-weight: bold; font-family: monospace; color: #00ff00; text-shadow: 0 0 10px #00ff00; }
        #clock-live i, #date-live i { color: #fff; margin-right: 10px; }
        #date-live { font-size: 1.1rem; color: #fff; font-weight: bold; }

        .form-section { padding: 15px; background: #002244; overflow-y: auto; border-bottom: 1px solid #113355; flex-shrink: 0; max-height: 45vh; }
        .input-group { margin-bottom: 10px; display: flex; flex-direction: column; }
        .input-group label { font-size: 0.85rem; margin-bottom: 4px; color: #8cb4d6; font-weight: bold; }
        .input-group label i { color: #fff; margin-right: 5px; }
        
        input, select { padding: 10px; font-size: 0.95rem; border-radius: 6px; border: 1px solid #ff851b; background: #001224; color: white; font-weight: bold; }
        input[type="file"] { font-size: 0.8rem; background: #001224; border: 1px dashed #ff851b; padding: 5px; cursor: pointer; }
        
        button.btn-tambah { background: #ff851b; color: white; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 6px; width: 100%; font-size: 1.1rem; margin-top: 5px; }

        /* LIST MISI AKTIF DETAIL */
        .list-section { flex: 1; overflow-y: auto; padding: 15px; background: #001f3f; }
        .flight-card { background: #002d5a; border-left: 6px solid; border-radius: 10px; padding: 15px; margin-bottom: 15px; box-shadow: 0 6px 15px rgba(0,0,0,0.7); border: 1px solid #113355; }
        
        .card-header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid rgba(255,133,27,0.3); padding-bottom: 8px; }
        .rute-summary { font-size: 0.85rem; font-weight: bold; color: #fff; }
        .btn-cancel { background: none; border: none; color: #dc3545; cursor: pointer; font-size: 1.2rem; }

        .card-main-body { display: flex; gap: 15px; align-items: center; }
        .card-main-body img { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; border: 3px solid; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .info-detail { flex: 1; }
        .info-detail h4 { margin: 0; font-size: 1rem; color: #fff; text-transform: uppercase; }
        .info-detail .serial-txt { font-size: 0.9rem; color: #00ff00; font-family: monospace; font-weight: bold; }

        /* Detail Waktu & Durasi */
        .flight-timer-info { margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 6px; font-size: 0.75rem; }
        .timer-item { display: flex; flex-direction: column; }
        .timer-label { color: #8cb4d6; font-weight: bold; margin-bottom: 2px; }
        .timer-value { color: #fff; font-family: monospace; font-weight: bold; }

        .btn-action-group { display: flex; gap: 8px; margin-top: 12px; }
        .btn-focus-card { background: #007bff; color: white; border: none; padding: 10px; border-radius: 5px; font-weight: bold; flex: 1; cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; gap: 5px; }

        /* Marker Pesawat Map */
        .plane-wrapper { display: flex; flex-direction: column; align-items: center; position: relative; }
        .plane-info-overlay { 
            position: absolute; top: -110px; display: flex; flex-direction: column; align-items: center; 
            background: rgba(0,0,0,0.9); padding: 10px; border-radius: 12px; border: 3px solid #ff851b;
            min-width: 170px; text-align: center; pointer-events: none;
        }
        .plane-info-overlay img.pilot-photo { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #fff; margin-bottom: 5px; object-fit: cover; }
        .plane-info-overlay .name { font-size: 14px; font-weight: bold; color: #fff; }
        .plane-info-overlay .serial { font-size: 16px; font-weight: bold; color: #00ff00; font-family: monospace; }
        .plane-status-tag { position: absolute; bottom: -30px; background: #ff851b; color: #000; font-size: 12px; font-weight: bold; padding: 2px 10px; border-radius: 4px; white-space: nowrap; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="header">
            <h2>KODAL LOGISTIK KORPASGAT</h2>
            <div class="live-info">
                <div id="date-live"><i class="fa-solid fa-calendar-days"></i> -- --- ----</div>
                <div id="clock-live"><i class="fa-solid fa-clock"></i> 00:00:00</div>
            </div>
        </div>

        <div class="form-section">
            <div class="input-group"><label><i class="fa-solid fa-box"></i> Misi / Logistik</label><input type="text" id="inp_barang" placeholder="Contoh: Amunisi"></div>
            <div class="input-group"><label><i class="fa-solid fa-user-pilot"></i> Personel On Board</label><input type="text" id="inp_kurir" placeholder="Nama Lengkap"></div>
            <div class="input-group"><label><i class="fa-solid fa-plane"></i> Jenis & No Seri</label><input type="text" id="inp_pesawat" placeholder="Hercules C-130 / A-1301"></div>
            <div class="input-group"><label><i class="fa-solid fa-image"></i> Insert Foto</label><input type="file" id="inp_foto" accept="image/*"></div>
            <div class="input-group"><label><i class="fa-solid fa-calendar-check" style="color:#fff"></i> Jadwal Take Off</label><input type="datetime-local" id="inp_waktu"></div>
            
            <label style="color: #ff851b; font-size: 0.8rem; font-weight: bold; margin: 5px 0; display: block;">NAVIGASI RUTE MULTI-TRANSIT</label>
            <div class="input-group"><label>1. Asal</label><select id="inp_asal"></select></div>
            <div class="input-group"><label>2. Transit 1</label><select id="inp_transit1"></select></div>
            <div class="input-group"><label>3. Transit 2</label><select id="inp_transit2"></select></div>
            <div class="input-group"><label>4. Tujuan Akhir</label><select id="inp_tujuan"></select></div>
            <div class="input-group"><label>5. Kembali ke Base</label><select id="inp_kembali"></select></div>
            
            <button class="btn-tambah" onclick="prosesTambahPenerbangan()">➕ AKTIVASI MISI</button>
        </div>

        <div class="list-section" id="flight-list"></div>
    </div>

    <div id="map-container"><div id="map"></div></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const daftarBandara = [
            { nama: "Sabang (SBG) - Lanud Maimun Saleh", lat: 5.8753, lng: 95.3375 },
            { nama: "Banda Aceh (BTJ) - Sultan Iskandar Muda", lat: 5.5239, lng: 95.4197 },
            { nama: "Natuna (NTX) - Lanud Raden Sadjad", lat: 3.9453, lng: 108.3871 },
            { nama: "Jakarta (HLP) - Lanud Halim Perdanakusuma", lat: -6.2655, lng: 106.8906 },
            { nama: "Madiun (IWX) - Lanud Iswahjudi", lat: -7.6158, lng: 111.4338 },
            { nama: "Malang (MLG) - Lanud Abdul Rachman Saleh", lat: -7.9264, lng: 112.7135 },
            { nama: "Makassar (UPG) - Lanud Sultan Hasanuddin", lat: -5.0616, lng: 119.5539 },
            { nama: "Biak (BIK) - Lanud Manuhua", lat: -1.1911, lng: 136.1086 },
            { nama: "Jayapura (DJJ) - Lanud Silas Papare", lat: -2.5765, lng: 140.5158 },
            { nama: "Merauke (MKQ) - Lanud J.A. Dimara", lat: -8.5208, lng: 140.4184 },
            { nama: "Kupang (KOE) - Lanud El Tari", lat: -10.1705, lng: 123.6653 }
        ];

        // Kecepatan Hercules C-130 rata-rata (km/jam)
        const SPEED_HERCULES = 540;

        function isiDropdown() {
            const ids = ['inp_asal', 'inp_transit1', 'inp_transit2', 'inp_tujuan', 'inp_kembali'];
            ids.forEach(id => {
                const select = document.getElementById(id);
                if (!id.includes('asal') && !id.includes('tujuan')) select.innerHTML = '<option value="">-- Lewati --</option>';
                daftarBandara.sort((a,b) => a.nama.localeCompare(b.nama)).forEach(b => {
                    select.innerHTML += `<option value="${b.lat},${b.lng},${b.nama}" ${id==='inp_asal'&&b.nama.includes('Halim')?'selected':''}>${b.nama}</option>`;
                });
            });
        }

        const map = L.map('map', { center: [-2.5, 118], zoom: 5 });
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}').addTo(map);

        let flights = [];
        let flightCounter = 0;
        const warnaMisi = ['#ff851b', '#00e5ff', '#39ff14', '#ff007f'];

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        async function prosesTambahPenerbangan() {
            const kurir = document.getElementById('inp_kurir').value || "Crew TNI AU";
            const pesawat = document.getElementById('inp_pesawat').value || "Hercules C-130";
            const barang = document.getElementById('inp_barang').value || "Logistik";
            const waktuTakeOff = new Date(document.getElementById('inp_waktu').value);
            
            const file = document.getElementById('inp_foto').files[0];
            let fotoUrl = `https://ui-avatars.com/api/?name=${kurir.replace(' ','+')}&background=002d5a&color=fff`;
            if (file) fotoUrl = await new Promise(r => { const f=new FileReader(); f.onload=e=>r(e.target.result); f.readAsDataURL(file); });

            const rute = [];
            ['inp_asal', 'inp_transit1', 'inp_transit2', 'inp_tujuan', 'inp_kembali'].forEach(id => {
                const val = document.getElementById(id).value;
                if(val){ const d=val.split(','); rute.push({lat:parseFloat(d[0]), lng:parseFloat(d[1]), nama:d[2]}); }
            });

            // Kalkulasi Jarak & Waktu
            let totalDist = 0;
            for(let i=0; i<rute.length-1; i++) {
                totalDist += calculateDistance(rute[i].lat, rute[i].lng, rute[i+1].lat, rute[i+1].lng);
            }
            const durationHours = totalDist / SPEED_HERCULES;
            const eta = new Date(waktuTakeOff.getTime() + (durationHours * 3600000));
            const durationTxt = `${Math.floor(durationHours)}j ${Math.round((durationHours % 1) * 60)}m`;

            const warna = warnaMisi[flightCounter % warnaMisi.length];
            const angle = Math.atan2(rute[1].lng - rute[0].lng, rute[1].lat - rute[0].lat) * 180 / Math.PI;

            const markerHTML = `
                <div class="plane-wrapper">
                    <div class="plane-info-overlay">
                        <img src="${fotoUrl}" class="pilot-photo">
                        <div class="name">${kurir}</div>
                        <div class="serial">${pesawat}</div>
                    </div>
                    <svg viewBox="0 0 100 100" width="80" height="80" style="transform: rotate(${angle}deg);">
                        <g fill="${warna}" stroke="#fff" stroke-width="2">
                            <path d="M42 15 Q50 5 58 15 L58 85 Q50 95 42 85 Z" />
                            <path d="M58 40 L98 46 L98 54 L58 50 Z" />
                            <path d="M42 40 L2 46 L2 54 L42 50 Z" />
                        </g>
                    </svg>
                    <div class="plane-status-tag" id="tag-${flightCounter}">TAXIING</div>
                </div>`;

            const flight = {
                id: flightCounter++, kurir, pesawat, barang, rute, fotoUrl, warna, status: "STANDBY", 
                depTime: waktuTakeOff, eta: eta, duration: durationTxt,
                marker: L.marker([rute[0].lat, rute[0].lng], {
                    icon: L.divIcon({ html: markerHTML, className: 'plane-container', iconSize: [180, 200], iconAnchor: [90, 140] }), opacity: 0
                }).addTo(map),
                line: L.polyline(rute.map(t=>[t.lat,t.lng]), {color:warna, weight:3, dashArray:'10,15'}).addTo(map)
            };
            flights.push(flight); renderSidebar();
        }

        function renderSidebar() {
            const list = document.getElementById('flight-list'); list.innerHTML = "";
            [...flights].reverse().forEach(f => {
                const ruteTxt = f.rute.map(t => t.nama.split('-')[0].trim()).join(' ➔ ');
                list.innerHTML += `
                    <div class="flight-card" style="border-left-color: ${f.warna}">
                        <div class="card-header-top">
                            <span class="rute-summary">${ruteTxt}</span>
                            <button class="btn-cancel" onclick="hapusMisi(${f.id})">❌</button>
                        </div>
                        <div class="card-main-body">
                            <img src="${f.fotoUrl}" style="border-color:${f.warna}">
                            <div class="info-detail">
                                <h4>${f.kurir}</h4>
                                <span class="serial-txt">${f.pesawat}</span>
                                <span style="font-size:0.8rem; display:block; margin-top:2px;">📦 ${f.barang}</span>
                            </div>
                        </div>
                        <div class="flight-timer-info">
                            <div class="timer-item">
                                <span class="timer-label">TAKE OFF</span>
                                <span class="timer-value">${f.depTime.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'})} WIB</span>
                            </div>
                            <div class="timer-item">
                                <span class="timer-label">EST. SAMPAI (ETA)</span>
                                <span class="timer-value">${f.eta.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'})} WIB</span>
                            </div>
                            <div class="timer-item" style="grid-column: span 2; border-top: 1px solid #333; padding-top:5px; margin-top:5px;">
                                <span class="timer-label">DURASI PERJALANAN: <span style="color:#ffee00">${f.duration}</span></span>
                            </div>
                        </div>
                        <div class="btn-action-group">
                            <button class="btn-focus-card" onclick="map.setView(flights.find(x=>x.id===${f.id}).marker.getLatLng(), 8)">🎯 FOCUS TRACK</button>
                        </div>
                    </div>`;
            });
        }

        window.hapusMisi = id => {
            const i = flights.findIndex(f => f.id === id);
            if(i > -1) { map.removeLayer(flights[i].marker); map.removeLayer(flights[i].line); flights.splice(i, 1); renderSidebar(); }
        };

        isiDropdown();
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock-live').innerHTML = `<i class="fa-solid fa-clock"></i> ` + now.toLocaleTimeString('id-ID');
            document.getElementById('date-live').innerHTML = `<i class="fa-solid fa-calendar-day"></i> ` + now.toLocaleDateString('id-ID', {day:'2-digit', month:'long', year:'numeric'});
            flights.forEach(f => { 
                const tag = document.getElementById(`tag-${f.id}`);
                if (f.status === "STANDBY" && now >= f.depTime) { 
                    f.status = "TERBANG"; f.marker.setOpacity(1); 
                    if(tag) tag.innerText = "AIRBORNE";
                }
                if (f.status === "TERBANG" && now >= f.eta) {
                    if(tag) { tag.innerText = "ARRIVED"; tag.style.background = "#00ff00"; }
                }
            });
        }, 1000);
    </script>
</body>
</html>
