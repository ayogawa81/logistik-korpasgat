<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Logistik KORPASGAT</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #000; color: white; display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 420px; background: #001f3f; display: flex; flex-direction: column; border-right: 2px solid #ff851b; z-index: 1000; }
        #map-container { flex: 1; position: relative; background: #000; }
        #map { height: 100%; width: 100%; background: #011425; }

        .header { background: #002d5a; padding: 15px; text-align: center; border-bottom: 2px solid #ff851b; }
        .header h2 { margin: 0 0 5px 0; font-size: 1.3rem; letter-spacing: 1px; color: #ff851b; }
        #clock { font-size: 1.6rem; font-weight: bold; font-family: monospace; color: #00ff00; }

        .form-section { padding: 15px; background: #002244; overflow-y: auto; border-bottom: 1px solid #113355; flex-shrink: 0; max-height: 55vh; }
        .input-group { margin-bottom: 12px; display: flex; flex-direction: column; }
        .input-group label { font-size: 0.85rem; margin-bottom: 4px; color: #8cb4d6; font-weight: bold;}
        
        input[type="text"], input[type="datetime-local"], select { padding: 10px; font-size: 1rem; border-radius: 4px; border: 1px solid #ff851b; background: #001224; color: white; font-weight: bold; }
        input[type="file"] { font-size: 0.85rem; background: #001224; border: 1px dashed #ff851b; padding: 5px; color: #fff; cursor: pointer; font-weight: normal;}
        
        button.btn-tambah { background: #ff851b; color: white; border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 4px; width: 100%; margin-top: 5px; transition: 0.3s; font-size: 1rem; }
        button.btn-tambah:hover { background: #e07015; }

        .route-label { color: #ff851b !important; font-size: 0.85rem !important; margin-top: 10px; margin-bottom: 5px; display: block;}

        .list-section { flex: 1; overflow-y: auto; padding: 10px; background: #001f3f; }
        .list-section h3 { font-size: 1.1rem; color: #8cb4d6; margin-top: 0; text-align: center; border-bottom: 1px solid #113355; padding-bottom: 10px; }
        
        /* Kartu Penerbangan */
        .flight-card { background: #002d5a; border-left: 5px solid; border-radius: 6px; padding: 12px; margin-bottom: 12px; display: flex; flex-direction: column; gap: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.6); }
        .flight-card.tiba { border-left-color: #28a745 !important; opacity: 0.8; }
        
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .rute-text { font-size: 0.85rem; font-weight:bold; word-break: break-word; line-height: 1.4; flex: 1; margin-right: 5px; }
        
        .badge-container { display: flex; align-items: center; gap: 5px; }
        .status-badge { font-size: 0.65rem; padding: 4px 6px; border-radius: 3px; font-weight: bold; white-space: nowrap; }
        .status-menunggu { background: #6c757d; color: white; }
        .status-terbang { background: #007bff; color: white; }
        .status-tiba { background: #28a745; color: white; }
        .status-transit { background: #ffc107; color: black; }

        .btn-batal { background: #dc3545; color: white; border: none; padding: 4px 6px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; font-weight: bold; transition: 0.2s;}
        .btn-batal:hover { background: #c82333; }
        
        .btn-lanjut { background: #17a2b8; color: white; border: none; padding: 8px 10px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-weight: bold; width: 100%; margin-top: 5px; transition: 0.2s; border: 1px solid #117a8b; animation: pulse 1.5s infinite;}
        .btn-lanjut:hover { background: #138496; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .card-body { display: flex; gap: 12px; align-items: center; }
        .card-body img { width: 55px; height: 55px; border-radius: 6px; object-fit: cover; border: 2px solid; }
        .info-barang { flex: 1; display: flex; flex-direction: column; gap: 3px; }
        .info-barang strong { font-size: 1.05rem; }
        .info-barang span { font-size: 0.85rem; color: #b3cde0; }
        
        .progress-container { width: 100%; background: #001224; height: 10px; border-radius: 5px; overflow: hidden; position: relative; margin-top: 5px; }
        .progress-bar { height: 100%; width: 0%; transition: width 1s linear; }
        .progress-text { font-size: 0.75rem; color: #8cb4d6; text-align: right; margin-top: 2px; font-weight: bold; }

        .plane-container { background: transparent; border: none; }
        .plane-box { position: relative; width: 50px; height: 50px; display: flex; justify-content: center; align-items: center; }
        .plane-svg { filter: drop-shadow(4px 6px 5px rgba(0,0,0,0.9)); transition: transform 0.1s linear; }
        .plane-avatar { position: absolute; top: -40px; width: 38px; height: 38px; border-radius: 50%; border: 3px solid; object-fit: cover; box-shadow: 0 3px 6px rgba(0,0,0,0.8); background: #001f3f; pointer-events: none; }
    </style>
</head>
<body>

    <!-- SIDEBAR KIRI -->
    <div id="sidebar">
        <div class="header">
            <h2>KODAL LOGISTIK KORPASGAT</h2>
            <div id="clock">00:00:00 WIB</div>
        </div>

        <div class="form-section">
            <div class="input-group">
                <label>Nama Barang / Misi</label>
                <input type="text" id="inp_barang" placeholder="Contoh: Logistik Amunisi">
            </div>
            <div class="input-group">
                <label>Nama Penerbang / Kurir</label>
                <input type="text" id="inp_kurir" placeholder="Contoh: Mayor Budi">
            </div>
            <div class="input-group">
                <label>Upload Foto (Opsional)</label>
                <input type="file" id="inp_foto" accept="image/*">
            </div>
            <div class="input-group">
                <label>Waktu Keberangkatan Awal</label>
                <input type="datetime-local" id="inp_waktu">
            </div>

            <label class="route-label">🛩️ JALUR PENERBANGAN</label>
            <div class="input-group">
                <label>1. Pangkalan Asal (Wajib)</label>
                <select id="inp_asal"></select>
            </div>
            <div class="input-group">
                <label>2. Transit 1 (Opsional)</label>
                <select id="inp_transit1"></select>
            </div>
            <div class="input-group">
                <label>3. Transit 2 (Opsional)</label>
                <select id="inp_transit2"></select>
            </div>
            <div class="input-group">
                <label>4. Tujuan Akhir (Wajib)</label>
                <select id="inp_tujuan"></select>
            </div>
            <div class="input-group">
                <label>5. Tujuan Kembali (Kembali ke Base)</label>
                <select id="inp_kembali"></select>
            </div>
            <button class="btn-tambah" onclick="prosesTambahPenerbangan()">➕ TAMBAHKAN JADWAL</button>
        </div>

        <div class="list-section">
            <h3>Status Armada Udara</h3>
            <div id="flight-list"></div>
        </div>
    </div>

    <!-- MAP KANAN -->
    <div id="map-container">
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const daftarBandara = [
            { nama: "Banda Aceh (BTJ) - Sultan Iskandar Muda", lat: 5.5239, lng: 95.4197 },
            { nama: "Medan (KNO) - Kualanamu", lat: 3.6353, lng: 98.8807 },
            { nama: "Medan (MES) - Lanud Soewondo", lat: 3.5623, lng: 98.6837 },
            { nama: "Pekanbaru (PKU) - Lanud Roesmin Nurjadin", lat: 0.4611, lng: 101.4483 },
            { nama: "Padang (PDG) - Minangkabau", lat: -0.7866, lng: 100.2816 },
            { nama: "Batam (BTH) - Hang Nadim", lat: 1.1211, lng: 104.1190 },
            { nama: "Palembang (PLM) - SMB II", lat: -2.8981, lng: 104.7001 },
            { nama: "Jakarta (HLP) - Lanud Halim Perdanakusuma", lat: -6.2655, lng: 106.8906 },
            { nama: "Jakarta (CGK) - Soekarno Hatta", lat: -6.1256, lng: 106.6558 },
            { nama: "Subang (SUA) - Lanud Suryadarma", lat: -6.5333, lng: 107.6500 },
            { nama: "Bandung (BDO) - Lanud Husein Sastranegara", lat: -6.9009, lng: 107.5768 },
            { nama: "Majalengka (KJT) - Kertajati", lat: -6.5807, lng: 108.1735 },
            { nama: "Yogyakarta (YIA) - Kulon Progo", lat: -7.9008, lng: 110.0519 },
            { nama: "Yogyakarta (JOG) - Lanud Adisutjipto", lat: -7.7844, lng: 110.4316 },
            { nama: "Solo (SOC) - Lanud Adi Soemarmo", lat: -7.5165, lng: 110.7554 },
            { nama: "Surabaya (SUB) - Juanda", lat: -7.3798, lng: 112.7874 },
            { nama: "Malang (MLG) - Lanud Abdul Rachman Saleh", lat: -7.9264, lng: 112.7135 },
            { nama: "Madiun (IWX) - Lanud Iswahjudi", lat: -7.6158, lng: 111.4338 },
            { nama: "Denpasar (DPS) - Ngurah Rai", lat: -8.7481, lng: 115.1671 },
            { nama: "Lombok (LOP) - Zainuddin Abdul Madjid", lat: -8.7582, lng: 116.2753 },
            { nama: "Kupang (KOE) - Lanud El Tari", lat: -10.1705, lng: 123.6653 },
            { nama: "Pontianak (PNK) - Lanud Supadio", lat: -0.1507, lng: 109.4039 },
            { nama: "Balikpapan (BPN) - Sepinggan", lat: -1.2683, lng: 116.8944 },
            { nama: "Samarinda (AAP) - APT Pranoto", lat: -0.3700, lng: 117.2500 },
            { nama: "Banjarmasin (BDJ) - Syamsudin Noor", lat: -3.4402, lng: 114.7617 },
            { nama: "Palangkaraya (PKY) - Tjilik Riwut", lat: -2.2248, lng: 113.9439 },
            { nama: "Tarakan (TRK) - Lanud Anang Busra", lat: 3.3262, lng: 117.5647 },
            { nama: "Makassar (UPG) - Lanud Sultan Hasanuddin", lat: -5.0616, lng: 119.5539 },
            { nama: "Manado (MDC) - Sam Ratulangi", lat: 1.5492, lng: 124.9268 },
            { nama: "Palu (PLW) - Mutiara SIS Al-Jufrie", lat: -0.9184, lng: 119.9095 },
            { nama: "Kendari (KDI) - Haluoleo", lat: -4.0822, lng: 122.4184 },
            { nama: "Ambon (AMQ) - Lanud Pattimura", lat: -3.7049, lng: 128.0890 },
            { nama: "Ternate (TTE) - Sultan Babullah", lat: 0.8317, lng: 127.3803 },
            { nama: "Sorong (SOQ) - Domine Eduard Osok", lat: -0.8845, lng: 131.2870 },
            { nama: "Manokwari (MKW) - Rendani", lat: -0.8933, lng: 134.0483 },
            { nama: "Biak (BIK) - Lanud Manuhua", lat: -1.1911, lng: 136.1086 },
            { nama: "Timika (TIM) - Lanud Yohanis Kapiyau", lat: -4.5296, lng: 136.8870 },
            { nama: "Jayapura (DJJ) - Lanud Silas Papare", lat: -2.5765, lng: 140.5158 },
            { nama: "Merauke (MKQ) - Lanud J.A. Dimara", lat: -8.5208, lng: 140.4184 }
        ];

        function isiDropdown() {
            const dropdowns = ['inp_asal', 'inp_transit1', 'inp_transit2', 'inp_tujuan', 'inp_kembali'];
            daftarBandara.sort((a, b) => a.nama.localeCompare(b.nama));
            dropdowns.forEach(id => {
                const select = document.getElementById(id);
                if (id !== 'inp_asal' && id !== 'inp_tujuan') select.innerHTML += `<option value="">-- Tidak Ada / Lewati --</option>`;
                daftarBandara.forEach(b => {
                    const valueStr = `${b.lat},${b.lng},${b.nama}`;
                    let isSelected = "";
                    if (id === 'inp_asal' && b.nama.includes('Halim')) isSelected = "selected";
                    if (id === 'inp_tujuan' && b.nama.includes('Jayapura')) isSelected = "selected";
                    select.innerHTML += `<option value="${valueStr}" ${isSelected}>${b.nama}</option>`;
                });
            });
        }
        isiDropdown();

        const nowLocal = new Date();
        nowLocal.setMinutes(nowLocal.getMinutes() - nowLocal.getTimezoneOffset());
        document.getElementById('inp_waktu').value = nowLocal.toISOString().slice(0, 16);

        // --- PENGATURAN MAP CENTER & ZOOM OTOMATIS (FIT BOUNDS) ---
        const indonesiaBounds = L.latLngBounds([-11.0, 94.0], [6.0, 141.0]);
        const map = L.map('map', { 
            minZoom: 4, 
            maxBounds: indonesiaBounds, 
            maxBoundsViscosity: 1.0 
        });
        
        // Memaksa peta tampil pas tepat di tengah layar sesuai ukuran monitor
        map.fitBounds(indonesiaBounds);

        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'Esri' }).addTo(map);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', { attribution: 'Esri' }).addTo(map);

        let flights = [];
        let flightCounter = 0;
        const KECEPATAN_PESAWAT_KMH = 800; 
        const warnaMisi = ['#ff851b', '#00e5ff', '#39ff14', '#ffcc00', '#ff007f', '#b026ff', '#ffffff'];

        function hitungJarak(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function bacaFoto(file) {
            return new Promise((resolve) => {
                if (!file) { resolve(null); return; }
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
        }

        async function prosesTambahPenerbangan() {
            const barang = document.getElementById('inp_barang').value || "Logistik Militer";
            const kurir = document.getElementById('inp_kurir').value || "Anggota Paskhas";
            const waktuDep = new Date(document.getElementById('inp_waktu').value);
            const fotoFile = document.getElementById('inp_foto').files[0];
            
            if (isNaN(waktuDep)) return alert("Tentukan waktu keberangkatan awal!");

            const rawRute = [
                document.getElementById('inp_asal').value,
                document.getElementById('inp_transit1').value,
                document.getElementById('inp_transit2').value,
                document.getElementById('inp_tujuan').value,
                document.getElementById('inp_kembali').value
            ];

            const ruteValid = [];
            for(let i=0; i < rawRute.length; i++) {
                if (rawRute[i] !== "") {
                    const data = rawRute[i].split(',');
                    const point = { lat: parseFloat(data[0]), lng: parseFloat(data[1]), nama: data[2] };
                    if(ruteValid.length === 0 || (ruteValid[ruteValid.length-1].nama !== point.nama)) ruteValid.push(point);
                }
            }

            if(ruteValid.length < 2) return alert("Pilih minimal Asal dan Tujuan yang berbeda!");

            const jalurPolyline = ruteValid.map(t => [t.lat, t.lng]);
            const namaRuteFull = ruteValid.map(t => t.nama.split('-')[0].trim()).join(' ➔ ');
            const warna = warnaMisi[flightCounter % warnaMisi.length];

            let fotoBase64 = await bacaFoto(fotoFile);
            if(!fotoBase64) fotoBase64 = `https://ui-avatars.com/api/?name=${kurir.replace(' ', '+')}&background=002d5a&color=fff&size=100`;

            const titikAwal = ruteValid[0];
            const titikDua = ruteValid[1];
            
            const jarakEtape1 = hitungJarak(titikAwal.lat, titikAwal.lng, titikDua.lat, titikDua.lng);
            const durasiEtape1Ms = (jarakEtape1 / KECEPATAN_PESAWAT_KMH) * 60 * 60 * 1000;
            const arrEtape1 = new Date(waktuDep.getTime() + durasiEtape1Ms);
            const angleAwal = Math.atan2(titikDua.lng - titikAwal.lng, titikDua.lat - titikAwal.lat) * 180 / Math.PI;

            const markerHTML = `
                <div class="plane-box">
                    <img src="${fotoBase64}" class="plane-avatar" style="border-color: ${warna};">
                    <svg id="svg-${flightCounter}" viewBox="0 0 100 100" width="55" height="55" class="plane-svg" style="transform: rotate(${angleAwal}deg);">
                        <g fill="${warna}" stroke="#fff" stroke-width="1.5">
                            <path d="M40 20 C40 5 60 5 60 20 L60 85 C60 95 40 95 40 85 Z" />
                            <path d="M60 42 L95 46 L95 54 L60 52 Z" />
                            <path d="M40 42 L5 46 L5 54 L40 52 Z" />
                            <path d="M55 85 L75 90 L75 95 L55 92 Z" />
                            <path d="M45 85 L25 90 L25 95 L45 92 Z" />
                            <path d="M48 80 L52 80 L52 98 L48 98 Z" fill="#fff" />
                            <rect x="18" y="41" width="4" height="12" rx="2" fill="#333"/>
                            <rect x="28" y="39" width="4" height="12" rx="2" fill="#333"/>
                            <rect x="68" y="39" width="4" height="12" rx="2" fill="#333"/>
                            <rect x="78" y="41" width="4" height="12" rx="2" fill="#333"/>
                        </g>
                    </svg>
                </div>
            `;
            
            const customIcon = L.divIcon({ html: markerHTML, className: 'plane-container', iconSize: [55, 55], iconAnchor: [27, 27] });
            
            const flight = {
                id: flightCounter++,
                barang, kurir, fotoUrl: fotoBase64, warna: warna,
                ruteData: ruteValid,
                namaRuteFull: namaRuteFull,
                status: "MENUNGGU_AWAL",
                currentLeg: 0, 
                legDepTime: waktuDep,
                legArrTime: arrEtape1,
                angle: angleAwal,
                waktuDepAwal: waktuDep,
                marker: L.marker([titikAwal.lat, titikAwal.lng], {icon: customIcon, opacity: 0}).addTo(map),
                line: L.polyline(jalurPolyline, { color: warna, weight: 3, dashArray: '6, 8' }).addTo(map),
            };

            flights.push(flight);
            renderSidebar();
            
            document.getElementById('inp_barang').value = "";
            document.getElementById('inp_kurir').value = "";
            document.getElementById('inp_foto').value = "";
            document.getElementById('inp_kembali').value = ""; 
        }

        window.lanjutTerbang = function(id) {
            const f = flights.find(x => x.id === id);
            if(f && f.status === "TRANSIT") {
                f.currentLeg++; 
                const start = f.ruteData[f.currentLeg];
                const end = f.ruteData[f.currentLeg + 1];
                
                f.legDepTime = new Date(); 
                const jarakKm = hitungJarak(start.lat, start.lng, end.lat, end.lng);
                const durasiMs = (jarakKm / KECEPATAN_PESAWAT_KMH) * 60 * 60 * 1000;
                f.legArrTime = new Date(f.legDepTime.getTime() + durasiMs);
                
                f.angle = Math.atan2(end.lng - start.lng, end.lat - start.lat) * 180 / Math.PI;
                f.status = "TERBANG";
                
                renderSidebar(); 
            }
        };

        window.hapusPenerbangan = function(id) {
            const index = flights.findIndex(f => f.id === id);
            if (index > -1) {
                map.removeLayer(flights[index].marker);
                map.removeLayer(flights[index].line);
                flights.splice(index, 1);
                renderSidebar();
            }
        };

        function renderSidebar() {
            const listDiv = document.getElementById('flight-list');
            listDiv.innerHTML = "";
            
            [...flights].reverse().forEach(f => {
                const depStr = f.waktuDepAwal.toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'});
                
                let tombolHtml = "";
                if (f.status === "TRANSIT") {
                    const nextDest = f.ruteData[f.currentLeg + 1].nama.split('-')[0].trim();
                    tombolHtml = `<button class="btn-lanjut" onclick="lanjutTerbang(${f.id})">🛫 Berangkat ke ${nextDest}</button>`;
                }

                listDiv.innerHTML += `
                    <div class="flight-card ${f.status === 'SELESAI' ? 'tiba' : ''}" id="card-${f.id}" style="border-left-color: ${f.warna};">
                        <div class="card-header">
                            <span class="rute-text" style="color: ${f.warna};">${f.namaRuteFull}</span>
                            <div class="badge-container">
                                <span class="status-badge" id="badge-${f.id}">...</span>
                                <button class="btn-batal" onclick="hapusPenerbangan(${f.id})" title="Batalkan/Hapus Misi">❌</button>
                            </div>
                        </div>
                        <div class="card-body">
                            <img src="${f.fotoUrl}" style="border-color: ${f.warna};">
                            <div class="info-barang">
                                <strong style="color: ${f.warna};">${f.kurir}</strong>
                                <span>📦 ${f.barang}</span>
                                <span>Berangkat: ${depStr} WIB</span>
                            </div>
                        </div>
                        <div class="progress-container">
                            <div class="progress-bar" id="prog-${f.id}" style="background-color: ${f.warna};"></div>
                        </div>
                        <div style="display:flex; justify-content: space-between; align-items:center;">
                             <div class="progress-text" id="prog-txt-${f.id}">0%</div>
                        </div>
                        ${tombolHtml}
                    </div>
                `;
            });
        }

        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID') + " WIB";

            flights.forEach(f => {
                const badge = document.getElementById(`badge-${f.id}`);
                const progBar = document.getElementById(`prog-${f.id}`);
                const progTxt = document.getElementById(`prog-txt-${f.id}`);
                
                if (f.status === "MENUNGGU_AWAL") {
                    if (now >= f.legDepTime) {
                        f.status = "TERBANG";
                        renderSidebar(); 
                    } else {
                        f.marker.setOpacity(0);
                        if(badge) { badge.className = "status-badge status-menunggu"; badge.innerText = "MENUNGGU JADWAL"; }
                    }
                } 
                else if (f.status === "TERBANG") {
                    f.marker.setOpacity(1); 
                    
                    if (now >= f.legArrTime) {
                        if (f.currentLeg < f.ruteData.length - 2) {
                            f.status = "TRANSIT";
                            const spot = f.ruteData[f.currentLeg + 1];
                            f.marker.setLatLng([spot.lat, spot.lng]);
                            
                            const svg = document.getElementById(`svg-${f.id}`);
                            if(svg) svg.style.transform = `rotate(${f.angle}deg) scale(1)`;
                            
                            renderSidebar(); 
                        } else {
                            f.status = "SELESAI";
                            const spot = f.ruteData[f.currentLeg + 1];
                            f.marker.setLatLng([spot.lat, spot.lng]);
                            f.line.setStyle({color: '#28a745'});
                            
                            const svg = document.getElementById(`svg-${f.id}`);
                            if(svg) svg.style.transform = `rotate(${f.angle}deg) scale(1)`;
                            
                            renderSidebar();
                        }
                    } else {
                        const durasiLeg = f.legArrTime.getTime() - f.legDepTime.getTime();
                        const durasiBerjalan = now.getTime() - f.legDepTime.getTime();
                        const prog = durasiBerjalan / durasiLeg;

                        const start = f.ruteData[f.currentLeg];
                        const end = f.ruteData[f.currentLeg + 1];

                        const lat = start.lat + (end.lat - start.lat) * prog;
                        const lng = start.lng + (end.lng - start.lng) * prog;
                        f.marker.setLatLng([lat, lng]);

                        const scale = 1 + (Math.sin(prog * Math.PI) * 0.8);
                        const svg = document.getElementById(`svg-${f.id}`);
                        if(svg) svg.style.transform = `rotate(${f.angle}deg) scale(${scale})`;

                        if(badge) { badge.className = "status-badge status-terbang"; badge.innerText = `TERBANG KE ${end.nama.split('-')[0].trim().toUpperCase()}`; }
                        if(progBar) progBar.style.width = (prog * 100).toFixed(1) + "%";
                        if(progTxt) progTxt.innerText = `Etape ${f.currentLeg + 1}/${f.ruteData.length - 1} : ${(prog * 100).toFixed(1)}%`;
                    }
                }
                else if (f.status === "TRANSIT") {
                    const cityName = f.ruteData[f.currentLeg + 1].nama.split('-')[0].trim();
                    if(badge) { badge.className = "status-badge status-transit"; badge.innerText = `STANDBY DI ${cityName.toUpperCase()}`; }
                    if(progBar) progBar.style.width = "100%";
                    if(progTxt) progTxt.innerText = `Etape ${f.currentLeg + 1} Selesai`;
                }
                else if (f.status === "SELESAI") {
                    if(badge) { badge.className = "status-badge status-tiba"; badge.innerText = "SELURUH MISI SELESAI"; }
                    if(progBar) { progBar.style.width = "100%"; progBar.style.backgroundColor = "#28a745"; }
                    if(progTxt) progTxt.innerText = "Mendarat Final";
                }
            });
        }, 1000); 
    </script>
</body>
</html>
