<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kodal Logistik KORPASGAT - Radar Tracking</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    
    <!-- SDK FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #000; color: white; display: flex; height: 100vh; overflow: hidden; }
        
        /* Layout */
        #sidebar { width: 460px; background: #001f3f; display: flex; flex-direction: column; border-right: 3px solid #ff851b; z-index: 1000; flex-shrink: 0; }
        #map-container { flex: 1; position: relative; background: #011425; }
        #map { height: 100%; width: 100%; }

        /* Header & Clock */
        .header { background: #002d5a; padding: 15px; text-align: center; border-bottom: 3px solid #ff851b; }
        .header h2 { margin: 0; font-size: 1.2rem; color: #ff851b; text-transform: uppercase; letter-spacing: 2px; }
        #date-live { font-size: 1rem; color: #fff; margin-top: 5px; }
        #clock-live { font-size: 2rem; font-weight: bold; font-family: monospace; color: #00ff00; text-shadow: 0 0 10px #00ff00; }

        /* Form Styling */
        .form-section { padding: 15px; background: #002244; overflow-y: auto; border-bottom: 1px solid #113355; max-height: 40vh; }
        .input-group { margin-bottom: 10px; display: flex; flex-direction: column; }
        .input-group label { font-size: 0.75rem; margin-bottom: 3px; color: #8cb4d6; font-weight: bold; text-transform: uppercase; }
        input, select { padding: 8px; font-size: 0.9rem; border-radius: 4px; border: 1px solid #ff851b; background: #001224; color: white; font-weight: bold; }
        
        button.btn-tambah { background: #ff851b; color: white; border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 4px; width: 100%; font-size: 1rem; margin-top: 5px; transition: 0.2s; }
        button.btn-tambah:hover { background: #e67616; transform: scale(1.01); }

        /* List Section */
        .list-section { flex: 1; overflow-y: auto; padding: 15px; background: #00142a; }
        .flight-card { background: #002d5a; border-left: 6px solid; border-radius: 8px; padding: 12px; margin-bottom: 15px; border: 1px solid #113355; position: relative; }
        
        /* Radar Element Styling */
        .p-marker { transition: all 1s linear; } /* Animasi Smooth Pergerakan */
        .plane-wrapper { display: flex; flex-direction: column; align-items: center; position: relative; }
        .pilot-photo-map { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #fff; object-fit: cover; box-shadow: 0 0 10px #000; }
        .serial-txt-map { color: #0f0; font-family: monospace; font-weight: bold; font-size: 1rem; text-shadow: 2px 2px 4px #000; background: rgba(0,0,0,0.6); padding: 2px 5px; border-radius: 3px; }
        
        .airport-dot { width: 10px; height: 10px; background: #ff851b; border: 2px solid #fff; border-radius: 50%; margin: 0 auto; }
        .airport-txt { color: #fff; font-size: 11px; font-weight: bold; text-shadow: 1px 1px 3px #000; display: block; }

        /* Cards UI */
        .nav-time-panel { display: grid; grid-template-columns: 1fr 1fr 1fr; background: rgba(0,0,0,0.4); margin-top: 8px; padding: 5px; border-radius: 4px; }
        .time-item { text-align: center; }
        .time-label { font-size: 0.6rem; color: #8cb4d6; display: block; }
        .time-val { font-family: monospace; font-size: 0.85rem; color: #00ff00; }
        
        .action-btns { position: absolute; top: 8px; right: 8px; display: flex; gap: 10px; }
        .btn-edit { background: none; border: none; color: #ffc107; cursor: pointer; }
        .btn-cancel { background: none; border: none; color: #ff4d4d; cursor: pointer; }

        @media (max-width: 768px) {
            body { flex-direction: column; overflow: auto; }
            #sidebar { width: 100%; height: auto; border-right: none; }
            #map-container { width: 100%; height: 50vh; }
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="header">
            <h2>KODAL LOGISTIK KORPASGAT</h2>
            <div id="date-live">-- --- ----</div>
            <div id="clock-live">00:00:00</div>
        </div>

        <div class="form-section">
            <input type="hidden" id="edit_fbId" value="">
            <div class="input-group"><label>Misi / Muatan</label><input type="text" id="inp_barang" placeholder="Contoh: Amunisi / Ransum"></div>
            <div class="input-group"><label>Personel On Board (POB)</label><input type="text" id="inp_kurir" placeholder="Nama Pilot/Danmisi"></div>
            <div class="input-group"><label>Jenis & No Seri Pesawat</label><input type="text" id="inp_pesawat" placeholder="Hercules / A-1301"></div>
            <div class="input-group"><label>Foto Pilot / Pesawat</label><input type="file" id="inp_foto" accept="image/*"></div>
            <div class="input-group"><label>Waktu Take Off Awal (WIB)</label><input type="datetime-local" id="inp_waktu"></div>
            
            <div style="border-top: 1px solid #113355; margin: 10px 0; padding-top: 5px;">
                <label style="color: #ff851b; font-size: 0.75rem; font-weight: bold;">RUTE PENERBANGAN (TRANSIT)</label>
                <div class="input-group"><select id="inp_asal"></select></div>
                <div class="input-group"><select id="inp_transit1"></select></div>
                <div class="input-group"><select id="inp_transit2"></select></div>
                <div class="input-group"><select id="inp_tujuan"></select></div>
                <div class="input-group"><select id="inp_kembali"></select></div>
            </div>
            
            <button class="btn-tambah" id="btn_submit" onclick="prosesTambahPenerbangan()">🚀 AKTIVASI MISI RADAR</button>
        </div>

        <div class="list-section" id="flight-list">
            <!-- Flight cards will appear here -->
        </div>
    </div>

    <div id="map-container"><div id="map"></div></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // FIREBASE CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyBifnBivkGMG827wJGXhIDtjZ5EHNNtLp8",
            authDomain: "kodal-logistik-korpasgat.firebaseapp.com",
            projectId: "kodal-logistik-korpasgat",
            storageBucket: "kodal-logistik-korpasgat.firebasestorage.app",
            messagingSenderId: "533092732764",
            appId: "1:533092732764:web:ac77a04f83a12e69667b99",
            databaseURL: "https://kodal-logistik-korpasgat-default-rtdb.firebaseio.com"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // MAP SETUP
        const map = L.map('map', { zoomControl: false }).setView([-2.2, 118], 5);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        const daftarBandara = [
            { nama: "Sabang - Lanud MUS", lat: 5.8753, lng: 95.3375 },
            { nama: "Banda Aceh - Lanud SIM", lat: 5.5239, lng: 95.4197 },
            { nama: "Medan - Lanud SWO", lat: 3.5623, lng: 98.6837 },
            { nama: "Pekanbaru - Lanud RSN", lat: 0.4611, lng: 101.4483 },
            { nama: "Ranai - Lanud RSA", lat: 3.9453, lng: 108.3871 },
            { nama: "Palembang - Lanud SMH", lat: -2.8981, lng: 104.7001 },
            { nama: "Jakarta - Lanud HLP", lat: -6.2655, lng: 106.8906 },
            { nama: "Bandung - Lanud HSN", lat: -6.9009, lng: 107.5768 },
            { nama: "Madiun - Lanud IWI", lat: -7.6158, lng: 111.4338 },
            { nama: "Malang - Lanud ABD", lat: -7.9264, lng: 112.7135 },
            { nama: "Pontianak - Lanud SPO", lat: -0.1507, lng: 109.4039 },
            { nama: "Balikpapan - Lanud DMB", lat: -1.2683, lng: 116.8944 },
            { nama: "Tarakan - Lanud ANB", lat: 3.3262, lng: 117.5647 },
            { nama: "Makassar - Lanud HND", lat: -5.0616, lng: 119.5539 },
            { nama: "Manado - Lanud SRI", lat: 1.5492, lng: 124.9268 },
            { nama: "Denpasar - Lanud RAI", lat: -8.7481, lng: 115.1671 },
            { nama: "Kupang - Lanud ELT", lat: -10.1705, lng: 123.6653 },
            { nama: "Ambon - Lanud PTM", lat: -3.7049, lng: 128.0890 },
            { nama: "Biak - Lanud MUN", lat: -1.1911, lng: 136.1086 },
            { nama: "Jayapura - Lanud SIL", lat: -2.5765, lng: 140.5158 },
            { nama: "Timika - Lanud YKH", lat: -4.5296, lng: 136.8870 },
            { nama: "Merauke - Lanud DMA", lat: -8.5208, lng: 140.4184 }
        ];

        let flights = [];
        const SPEED_KNOTS = 250; // Kecepatan simulasi Hercules

        // Helper: Hitung Jarak
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2-lat1)*Math.PI/180; 
            const dLon = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        // DATABASE SYNC
        db.ref('misi_logistik').on('value', (snapshot) => {
            flights.forEach(f => { 
                if(f.marker) map.removeLayer(f.marker); 
                if(f.line) map.removeLayer(f.line); 
                if(f.labels) f.labels.forEach(l => map.removeLayer(l)); 
            });
            flights = [];
            const data = snapshot.val();
            if (data) {
                Object.keys(data).forEach(id => {
                    const f = data[id]; f.fbId = id; 
                    initFlightMarker(f); 
                    flights.push(f);
                });
            }
            renderSidebar();
        });

        function initFlightMarker(f) {
            const markerHTML = `
                <div class="plane-wrapper" id="wrap-${f.fbId}">
                    <div style="position:absolute; top:-75px; text-align:center; min-width:100px;">
                        <img src="${f.fotoUrl}" class="pilot-photo-map" style="border-color:${f.warna}">
                        <div class="serial-txt-map">${f.pesawat}</div>
                    </div>
                    <svg viewBox="0 0 100 100" width="40" height="40" id="svg-${f.fbId}" style="transition: transform 0.5s;">
                        <path d="M50 5 L90 90 L50 70 L10 90 Z" fill="${f.warna}" stroke="#fff" stroke-width="5"/>
                    </svg>
                </div>`;

            const startPos = f.rute[f.currentStep || 0];
            f.marker = L.marker([startPos.lat, startPos.lng], {
                icon: L.divIcon({ html: markerHTML, className: 'p-marker', iconSize: [40, 40], iconAnchor: [20, 20] })
            }).addTo(map);

            f.line = L.polyline(f.rute.map(r=>[r.lat, r.lng]), {
                color: f.warna, weight: 2, dashArray: '10, 10', opacity: 0.5
            }).addTo(map);

            f.labels = f.rute.map((r) => {
                return L.marker([r.lat, r.lng], {
                    icon: L.divIcon({ 
                        html: `<div style="text-align:center"><div class="airport-dot"></div><span class="airport-txt">${r.nama.split('-')[0]}</span></div>`, 
                        className: 'a-label', iconAnchor: [30, -5] 
                    })
                }).addTo(map);
            });
        }

        async function prosesTambahPenerbangan() {
            const fbId = document.getElementById('edit_fbId').value;
            const barang = document.getElementById('inp_barang').value;
            const kurir = document.getElementById('inp_kurir').value || "POB";
            const pesawat = document.getElementById('inp_pesawat').value || "UNIT-01";
            const waktuVal = document.getElementById('inp_waktu').value;
            
            if (!barang || !waktuVal) { alert("Lengkapi Misi dan Waktu!"); return; }

            const file = document.getElementById('inp_foto').files[0];
            let fotoUrl = "https://ui-avatars.com/api/?name=" + pesawat + "&background=ff851b&color=fff";
            if (file) { 
                fotoUrl = await new Promise(r => { const f = new FileReader(); f.onload = e => r(e.target.result); f.readAsDataURL(file); }); 
            } else if (fbId) {
                const old = flights.find(x => x.fbId === fbId);
                if(old) fotoUrl = old.fotoUrl;
            }

            const ruteIds = ['inp_asal', 'inp_transit1', 'inp_transit2', 'inp_tujuan', 'inp_kembali'];
            const rute = [];
            ruteIds.forEach(id => {
                const val = document.getElementById(id).value;
                if (val) { const d = val.split(','); rute.push({ lat: parseFloat(d[0]), lng: parseFloat(d[1]), nama: d[2], rawVal: val }); }
            });

            if(rute.length < 2) { alert("Minimal pilih Asal dan Tujuan!"); return; }

            const payload = {
                barang, kurir, pesawat, fotoUrl, rute,
                depTimeStr: new Date(waktuVal).toISOString(),
                status: "STANDBY",
                currentStep: 0,
                isWaiting: true,
                warna: '#' + Math.floor(Math.random()*16777215).toString(16)
            };

            if (fbId) { db.ref('misi_logistik/' + fbId).update(payload); }
            else { db.ref('misi_logistik').push(payload); }
            resetForm();
        }

        function triggerTakeOff(id) {
            const f = flights.find(x => x.fbId === id);
            const now = new Date();
            const p1 = f.rute[f.currentStep];
            const p2 = f.rute[f.currentStep + 1];
            const dist = calculateDistance(p1.lat, p1.lng, p2.lat, p2.lng);
            const hours = dist / (SPEED_KNOTS * 1.852); 
            const nextEta = new Date(now.getTime() + (hours * 3600000));

            db.ref('misi_logistik/' + id).update({
                isWaiting: false,
                lastTakeOffStr: now.toISOString(),
                nextEtaStr: nextEta.toISOString(),
                etd: now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                eta: nextEta.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                eet: Math.round(hours * 60) + "m",
                status: "IN_FLIGHT"
            });
        }

        function renderSidebar() {
            const list = document.getElementById('flight-list'); list.innerHTML = "";
            [...flights].reverse().forEach(f => {
                const isLast = f.currentStep >= f.rute.length - 1;
                const ruteTxt = f.rute.map((t, i) => `<span style="color:${i<=f.currentStep?'#00ff00':'#ccc'}">${t.nama.split('-')[0].trim()}</span>`).join(' → ');

                list.innerHTML += `
                <div class="flight-card" style="border-left-color:${f.warna}">
                    <div class="action-btns">
                        <button class="btn-edit" onclick="editMisi('${f.fbId}')"><i class="fa-solid fa-edit"></i></button>
                        <button class="btn-cancel" onclick="hapusMisi('${f.fbId}')"><i class="fa-solid fa-trash"></i></button>
                    </div>
                    <div style="font-size:0.7rem; margin-bottom:5px;">${ruteTxt}</div>
                    <div style="display:flex; gap:10px; align-items:center;">
                        <img src="${f.fotoUrl}" style="width:45px; height:45px; border-radius:50%; border:2px solid ${f.warna}">
                        <div>
                            <div style="font-weight:bold; color:#ff851b;">${f.barang}</div>
                            <div style="font-size:0.8rem;">${f.pesawat} | ${f.kurir}</div>
                        </div>
                    </div>
                    <div class="nav-time-panel">
                        <div class="time-item"><span class="time-label">TAKEOFF</span><span class="time-val">${f.etd || '--:--'}</span></div>
                        <div class="time-item"><span class="time-label">EET</span><span class="time-val">${f.eet || '--:--'}</span></div>
                        <div class="time-item"><span class="time-label">LANDING</span><span class="time-val">${f.eta || '--:--'}</span></div>
                    </div>
                    ${!isLast && f.isWaiting ? `<button class="btn-tambah" style="background:#00ff00; color:#000; margin-top:10px;" onclick="triggerTakeOff('${f.fbId}')">🛫 IZIN TAKE OFF</button>` : ''}
                    ${!f.isWaiting ? `<button class="btn-tambah" style="background:#007bff; margin-top:10px;" onclick="focusMarker('${f.fbId}')">🎯 TRACKING</button>` : ''}
                </div>`;
            });
        }

        function focusMarker(id) {
            const f = flights.find(x => x.fbId === id);
            if(f) map.setView(f.marker.getLatLng(), 8);
        }

        // REAL-TIME LOOP
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock-live').innerText = now.toLocaleTimeString('id-ID');
            document.getElementById('date-live').innerText = now.toLocaleDateString('id-ID', {day:'2-digit', month:'long', year:'numeric'});

            flights.forEach(f => {
                if (f.isWaiting || f.currentStep >= f.rute.length - 1) return;

                const startTime = new Date(f.lastTakeOffStr);
                const endTime = new Date(f.nextEtaStr);
                
                if (now >= endTime) {
                    db.ref('misi_logistik/' + f.fbId).update({ isWaiting: true, currentStep: f.currentStep + 1, status: "LANDED" });
                } else {
                    const progress = (now - startTime) / (endTime - startTime);
                    const p1 = f.rute[f.currentStep];
                    const p2 = f.rute[f.currentStep + 1];
                    const lat = p1.lat + (p2.lat - p1.lat) * progress;
                    const lng = p1.lng + (p2.lng - p1.lng) * progress;
                    
                    f.marker.setLatLng([lat, lng]);
                    
                    // Rotate Plane Icon
                    const angle = Math.atan2(p2.lng - p1.lng, p2.lat - p1.lat) * 180 / Math.PI;
                    const svg = document.getElementById(`svg-${f.fbId}`);
                    if(svg) svg.style.transform = `rotate(${angle}deg)`;
                }
            });
        }, 1000);

        function resetForm() {
            document.getElementById('edit_fbId').value = "";
            document.getElementById('inp_barang').value = "";
            document.getElementById('btn_submit').innerText = "🚀 AKTIVASI MISI RADAR";
        }

        function editMisi(id) {
            const f = flights.find(x => x.fbId === id);
            document.getElementById('edit_fbId').value = f.fbId;
            document.getElementById('inp_barang').value = f.barang;
            document.getElementById('inp_kurir').value = f.kurir;
            document.getElementById('inp_pesawat').value = f.pesawat;
            document.getElementById('btn_submit').innerText = "💾 UPDATE DATA MISI";
        }

        function hapusMisi(id) { if(confirm("Hapus Misi dari Radar?")) db.ref('misi_logistik/' + id).remove(); }

        function initDropdowns() {
            const ids = ['inp_asal', 'inp_transit1', 'inp_transit2', 'inp_tujuan', 'inp_kembali'];
            ids.forEach(id => {
                const sel = document.getElementById(id);
                sel.innerHTML = `<option value="">-- ${id.replace('inp_','').toUpperCase()} --</option>`;
                daftarBandara.forEach(b => { sel.innerHTML += `<option value="${b.lat},${b.lng},${b.nama}">${b.nama}</option>`; });
            });
        }
        initDropdowns();
    </script>
</body>
</html>
