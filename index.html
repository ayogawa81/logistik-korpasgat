<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KORPASGAT TACTICAL RADAR</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --accent: #ff851b; --bg-dark: #0a0e14; --panel: #161b22; }
        body { margin: 0; padding: 0; display: flex; height: 100vh; background: var(--bg-dark); color: #e6edf3; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
        
        /* Sidebar Styling ala FlightRadar */
        #sidebar { width: 380px; background: var(--panel); border-right: 1px solid #30363d; z-index: 2000; display: flex; flex-direction: column; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        .header { background: #010409; padding: 15px; text-align: center; border-bottom: 2px solid var(--accent); }
        #clock { font-size: 1.5rem; color: #00ff00; font-family: 'Courier New', monospace; font-weight: bold; }
        
        .form-container { padding: 15px; overflow-y: auto; border-bottom: 1px solid #30363d; }
        .field { margin-bottom: 10px; }
        label { display: block; font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: #fff; border-radius: 4px; font-size: 13px; outline: none; }
        input:focus { border-color: var(--accent); }
        
        .btn-aktivasi { width: 100%; padding: 12px; background: var(--accent); color: #fff; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; transition: 0.2s; text-transform: uppercase; }
        .btn-aktivasi:hover { background: #e67700; transform: translateY(-1px); }

        #flight-list { flex: 1; overflow-y: auto; padding: 10px; background: #0d1117; }
        .flight-card { background: var(--panel); border-radius: 6px; padding: 12px; margin-bottom: 10px; border-left: 4px solid var(--accent); position: relative; border: 1px solid #30363d; }
        .flight-card b { color: var(--accent); font-size: 14px; }
        .status-tag { float: right; font-size: 10px; padding: 2px 6px; border-radius: 10px; background: #238636; }

        /* Map Styling */
        #map { flex: 1; background: #000; }
        .plane-icon-wrapper { text-align: center; }
        .plane-label { 
            background: rgba(13, 17, 23, 0.9); 
            color: #fff; 
            padding: 2px 6px; 
            border-radius: 4px; 
            font-size: 11px; 
            border: 1px solid var(--accent);
            white-space: nowrap;
            margin-top: -40px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="header">
        <div style="font-size: 0.7rem; color: var(--accent);">LOGISTIK KORPASGAT TACTICAL RADAR</div>
        <div id="clock">00:00:00</div>
    </div>
    
    <div class="form-container">
        <div style="display:flex; gap:8px;">
            <div class="field" style="flex:2;"><label>Callsign</label><input type="text" id="pesawat" placeholder="A-1341"></div>
            <div class="field" style="flex:1;"><label>POB</label><input type="number" id="pob_qty" value="1"></div>
        </div>
        <div class="field"><label>Waktu Take Off (LMT)</label><input type="datetime-local" id="takeoff_manual"></div>
        <div class="field"><label>Misi / Muatan</label><input type="text" id="misi" placeholder="Bekal Ulang"></div>
        
        <div style="display:flex; gap:8px;">
            <div class="field" style="flex:1;"><label>Type</label>
                <select id="tipe">
                    <option value="450">CN-235</option>
                    <option value="540">C-130</option>
                    <option value="800">B-737</option>
                </select>
            </div>
            <div class="field" style="flex:1;"><label>Warna Radar</label><input type="color" id="warna" value="#ff851b"></div>
        </div>
        <div class="field">
            <label>Route (Origin - Destination)</label>
            <div style="display:flex; gap:5px;">
                <select id="asal" style="flex:1;"></select>
                <select id="tujuan" style="flex:1;"></select>
            </div>
        </div>
        <button class="btn-aktivasi" id="main-btn" onclick="prosesMisi()">🚀 Deploy Misi</button>
    </div>

    <div id="flight-list"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Konfigurasi Database
    const firebaseConfig = { databaseURL: "https://kodal-logistik-korpasgat-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Inisialisasi Peta Mode Dark Satelit
    const map = L.map('map', { zoomControl: false }).setView([-2.5, 118], 5);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{y}/{x}{r}.png').addTo(map);

    const lanud = [
        { name: "HLP (Jakarta)", lat: -6.265, lng: 106.890 },
        { name: "HND (Makassar)", lat: -5.061, lng: 119.553 },
        { name: "DMB (Balikpapan)", lat: -1.268, lng: 116.894 },
        { name: "MUN (Biak)", lat: -1.191, lng: 136.108 }
    ];

    let activeMissions = {};

    function getDist(l1, n1, l2, n2) {
        const R = 6371;
        const dLat = (l2-l1) * Math.PI/180;
        const dLon = (n2-n1) * Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(l1*Math.PI/180)*Math.cos(l2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    // Database Listener
    db.ref('missions').on('value', snap => {
        const data = snap.val();
        const list = document.getElementById('flight-list');
        list.innerHTML = "";
        
        Object.values(activeMissions).forEach(m => { map.removeLayer(m.marker); map.removeLayer(m.line); clearInterval(m.timer); });
        activeMissions = {};

        if(data) {
            Object.keys(data).forEach(id => {
                const v = data[id];
                const takeoffTs = new Date(v.takeoff_manual).getTime();
                const duration = v.eet_min * 60000;
                
                list.innerHTML += `
                    <div class="flight-card" style="border-left-color:${v.warna}">
                        <b>${v.pesawat}</b> <span class="status-tag">ACTIVE</span><br>
                        <small>${v.misi} | POB: ${v.pob_qty}</small><br>
                        <div style="margin-top:5px; font-size:10px; color:#8b949e;">
                            DEP: ${v.takeoff_manual.split('T')[1]} | ETA: ${v.eta.split(',')[1]}
                        </div>
                    </div>
                `;

                const line = L.polyline([[v.lat, v.lng], [v.dLat, v.dLng]], {color: v.warna, weight: 1, dashArray: '4,6', opacity: 0.4}).addTo(map);
                const marker = L.marker([v.lat, v.lng], {
                    icon: L.divIcon({
                        className: 'plane-icon-wrapper',
                        html: `<div><div class="plane-label">${v.pesawat}</div><i class="fa-solid fa-plane" style="color:${v.warna}; font-size:20px;"></i></div>`
                    })
                }).addTo(map);

                const timer = setInterval(() => {
                    const progress = Math.min(Math.max((Date.now() - takeoffTs) / duration, 0), 1);
                    const curLat = v.lat + (v.dLat - v.lat) * progress;
                    const curLng = v.lng + (v.dLng - v.lng) * progress;
                    marker.setLatLng([curLat, curLng]);

                    // Heading Calculation
                    const angle = Math.atan2(v.dLat - v.lat, v.dLng - v.lng) * 180 / Math.PI;
                    const icon = marker.getElement()?.querySelector('.fa-plane');
                    if(icon) icon.style.transform = `rotate(${angle + 90}deg)`;

                    if(progress >= 1) clearInterval(timer);
                }, 1000);

                activeMissions[id] = { marker, line, timer };
            });
        }
    });

    async function prosesMisi() {
        const a = document.getElementById('asal').value.split('|');
        const t = document.getElementById('tujuan').value.split('|');
        const toManual = document.getElementById('takeoff_manual').value;
        if(!a[0] || !t[0] || !toManual) return;

        const dist = getDist(parseFloat(a[0]), parseFloat(a[1]), parseFloat(t[0]), parseFloat(t[1]));
        const eet = Math.round((dist / parseInt(document.getElementById('tipe').value)) * 60);
        const etaDate = new Date(new Date(toManual).getTime() + (eet * 60000));

        db.ref('missions').push({
            pesawat: document.getElementById('pesawat').value,
            pob_qty: document.getElementById('pob_qty').value,
            misi: document.getElementById('misi').value,
            takeoff_manual: toManual,
            warna: document.getElementById('warna').value,
            lat: parseFloat(a[0]), lng: parseFloat(a[1]),
            dLat: parseFloat(t[0]), dLng: parseFloat(t[1]),
            eet_min: eet,
            eta: etaDate.toLocaleString('id-ID', {hour:'2-digit', minute:'2-digit', day:'numeric', month:'short'})
        });
    }

    function init() {
        ['asal', 'tujuan'].forEach(id => {
            const sel = document.getElementById(id);
            sel.innerHTML = '<option value="">-- SELECT AIRBASE --</option>';
            lanud.forEach(p => sel.innerHTML += `<option value="${p.lat}|${p.lng}">${p.name}</option>`);
        });
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID'); }, 1000);
        const now = new Date(); now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('takeoff_manual').value = now.toISOString().slice(0,16);
    }
    init();
</script>
</body>
</html>
