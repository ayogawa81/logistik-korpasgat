<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kodal Logistik KORPASGAT - Radar Tracking</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #000; color: white; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 400px; background: #001f3f; display: flex; flex-direction: column; border-right: 3px solid #ff851b; z-index: 1000; flex-shrink: 0; }
        #map-container { flex: 1; position: relative; background: #011425; }
        #map { height: 100%; width: 100%; }
        .header { background: #002d5a; padding: 15px; text-align: center; border-bottom: 3px solid #ff851b; }
        .header h2 { margin: 0; font-size: 1.2rem; color: #ff851b; text-transform: uppercase; letter-spacing: 2px; }
        #clock-live { font-size: 2rem; font-weight: bold; font-family: monospace; color: #00ff00; text-shadow: 0 0 10px #00ff00; }
        .form-section { padding: 15px; background: #002244; overflow-y: auto; border-bottom: 1px solid #113355; flex-grow: 1; }
        .input-group { margin-bottom: 10px; display: flex; flex-direction: column; }
        .input-group label { font-size: 0.75rem; margin-bottom: 3px; color: #8cb4d6; font-weight: bold; }
        input, select { padding: 8px; font-size: 0.9rem; border-radius: 4px; border: 1px solid #ff851b; background: #001224; color: white; }
        button.btn-tambah { background: #ff851b; color: white; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 4px; width: 100%; font-size: 1rem; margin-top: 10px; box-shadow: 0 4px #a04e00; }
        button.btn-tambah:active { box-shadow: 0 2px #a04e00; transform: translateY(2px); }
        .flight-card { background: #002d5a; border-left: 6px solid; border-radius: 8px; padding: 12px; margin-bottom: 15px; border: 1px solid #113355; position: relative; }
        .p-marker { transition: all 1s linear; }
        .plane-wrapper { display: flex; flex-direction: column; align-items: center; position: relative; }
        .serial-txt-map { color: #0f0; font-family: monospace; font-weight: bold; font-size: 1rem; background: rgba(0,0,0,0.7); padding: 2px 5px; border-radius: 3px; }
        .airport-dot { width: 10px; height: 10px; background: #ff851b; border: 2px solid #fff; border-radius: 50%; margin: 0 auto; }
        .airport-txt { color: #fff; font-size: 11px; font-weight: bold; text-shadow: 1px 1px 3px #000; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="header">
            <h2>KODAL LOGISTIK KORPASGAT</h2>
            <div id="date-live">-- --- ----</div>
            <div id="clock-live">00:00:00</div>
        </div>

        <div class="form-section">
            <input type="hidden" id="edit_fbId" value="">
            <div class="input-group"><label>MISI / MUATAN</label><input type="text" id="inp_barang" placeholder="Contoh: Logistik Medis"></div>
            <div class="input-group"><label>PERSONEL ON BOARD (POB)</label><input type="text" id="inp_kurir" placeholder="Nama Pilot / Danmisi"></div>
            <div class="input-group"><label>JENIS & NO SERI PESAWAT</label><input type="text" id="inp_pesawat" placeholder="A-1301"></div>
            <div class="input-group"><label>WAKTU TAKE OFF AWAL</label><input type="datetime-local" id="inp_waktu"></div>
            
            <div style="border-top: 1px solid #113355; margin-top: 10px; padding-top: 10px;">
                <label style="color: #ff851b; font-size: 0.75rem; font-weight: bold;">RUTE PENERBANGAN</label>
                <div class="input-group"><select id="inp_asal"></select></div>
                <div class="input-group"><select id="inp_transit1"></select></div>
                <div class="input-group"><select id="inp_tujuan"></select></div>
            </div>
            
            <button class="btn-tambah" onclick="prosesTambahPenerbangan()">🚀 AKTIVASI MISI RADAR</button>
            <div id="status-log" style="font-size: 10px; color: #00ff00; margin-top: 5px; text-align: center;">Ready</div>
        </div>

        <div id="flight-list" style="padding: 15px; overflow-y: auto; background: #00142a; max-height: 30vh;"></div>
    </div>

    <div id="map-container"><div id="map"></div></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Konfigurasi Firebase Anda
        const firebaseConfig = {
            apiKey: "AIzaSyBifnBivkGMG827wJGXhIDtjZ5EHNNtLp8",
            authDomain: "kodal-logistik-korpasgat.firebaseapp.com",
            projectId: "kodal-logistik-korpasgat",
            storageBucket: "kodal-logistik-korpasgat.firebasestorage.app",
            messagingSenderId: "533092732764",
            appId: "1:533092732764:web:ac77a04f83a12e69667b99",
            databaseURL: "https://kodal-logistik-korpasgat-default-rtdb.firebaseio.com"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const map = L.map('map', { zoomControl: false }).setView([-2.2, 118], 5);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        const daftarBandara = [
            { nama: "Jakarta - Lanud HLP", lat: -6.2655, lng: 106.8906 },
            { nama: "Balikpapan - Lanud DMB", lat: -1.2683, lng: 116.8944 },
            { nama: "Makassar - Lanud HND", lat: -5.0616, lng: 119.5539 },
            { nama: "Biak - Lanud MUN", lat: -1.1911, lng: 136.1086 },
            { nama: "Madiun - Lanud IWI", lat: -7.6158, lng: 111.4338 }
        ];

        let flights = [];

        db.ref('misi_logistik').on('value', (snapshot) => {
            flights.forEach(f => { if(f.marker) map.removeLayer(f.marker); if(f.line) map.removeLayer(f.line); });
            flights = [];
            const data = snapshot.val();
            if (data) {
                Object.keys(data).forEach(id => {
                    const f = data[id]; f.fbId = id;
                    initMarker(f);
                    flights.push(f);
                });
            }
            renderSidebar();
        });

        function initMarker(f) {
            const html = `<div class="plane-wrapper">
                <div class="serial-txt-map" style="margin-bottom:5px">${f.pesawat}</div>
                <svg viewBox="0 0 100 100" width="30" height="30" id="svg-${f.fbId}"><path d="M50 5 L90 90 L50 70 L10 90 Z" fill="${f.warna || '#ff851b'}" stroke="#fff"/></svg>
            </div>`;
            f.marker = L.marker([f.rute[0].lat, f.rute[0].lng], {
                icon: L.divIcon({ html: html, className: 'p-marker', iconSize:[30,60], iconAnchor:[15,30] })
            }).addTo(map);
            f.line = L.polyline(f.rute.map(r=>[r.lat,r.lng]), {color:f.warna, weight:1, dashArray:'5,5'}).addTo(map);
        }

        function prosesTambahPenerbangan() {
            document.getElementById('status-log').innerText = "Mengirim data...";
            const barang = document.getElementById('inp_barang').value || "MISI RAHASIA";
            const kurir = document.getElementById('inp_kurir').value || "PILOT";
            const pesawat = document.getElementById('inp_pesawat').value || "AC-001";
            const rute = [];
            ['inp_asal', 'inp_transit1', 'inp_tujuan'].forEach(id => {
                const v = document.getElementById(id).value;
                if(v) { const d = v.split(','); rute.push({lat:parseFloat(d[0]), lng:parseFloat(d[1]), nama:d[2]}); }
            });

            if(rute.length < 2) { alert("Pilih minimal Asal dan Tujuan!"); return; }

            db.ref('misi_logistik').push({
                barang, kurir, pesawat, rute,
                status: "STANDBY", currentStep: 0, isWaiting: true,
                warna: '#'+Math.floor(Math.random()*16777215).toString(16)
            }).then(() => {
                document.getElementById('status-log').innerText = "Berhasil!";
                setTimeout(() => document.getElementById('status-log').innerText = "Ready", 2000);
            }).catch(e => alert("Error: " + e.message));
        }

        function renderSidebar() {
            const c = document.getElementById('flight-list'); c.innerHTML = "";
            flights.forEach(f => {
                c.innerHTML += `<div class="flight-card" style="border-left-color:${f.warna}">
                    <div style="font-weight:bold; color:#ff851b">${f.barang}</div>
                    <div style="font-size:12px">${f.pesawat} | ${f.kurir}</div>
                    <button style="width:100%; margin-top:5px; background:#00ff00; cursor:pointer" onclick="hapusMisi('${f.fbId}')">SELESAI / HAPUS</button>
                </div>`;
            });
        }

        function hapusMisi(id) { db.ref('misi_logistik/'+id).remove(); }

        setInterval(() => {
            const d = new Date();
            document.getElementById('clock-live').innerText = d.toLocaleTimeString('id-ID');
            document.getElementById('date-live').innerText = d.toLocaleDateString('id-ID', {day:'2-digit', month:'long', year:'numeric'});
        }, 1000);

        function initDropdowns() {
            ['inp_asal', 'inp_transit1', 'inp_tujuan'].forEach(id => {
                const s = document.getElementById(id);
                s.innerHTML = `<option value="">-- PILIH LOKASI --</option>`;
                daftarBandara.forEach(b => s.innerHTML += `<option value="${b.lat},${b.lng},${b.nama}">${b.nama}</option>`);
            });
        }
        initDropdowns();
    </script>
</body>
</html>
