<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kodal Logistik KORPASGAT</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; display: flex; height: 100vh; width: 100vw; overflow: hidden; }
        
        #sidebar { width: 380px; background: #001f3f; border-right: 3px solid #ff851b; display: flex; flex-direction: column; z-index: 2000; flex-shrink: 0; }
        .header { background: #002d5a; padding: 20px; text-align: center; border-bottom: 3px solid #ff851b; }
        #clock { font-size: 2.2rem; font-weight: bold; font-family: monospace; color: #00ff00; }

        .form-container { padding: 15px; overflow-y: auto; flex: 1; }
        .field { margin-bottom: 12px; }
        .field label { display: block; font-size: 0.7rem; font-weight: bold; color: #8cb4d6; margin-bottom: 4px; }
        input, select { width: 100%; padding: 12px; background: #001224; border: 1px solid #ff851b; color: white; border-radius: 4px; font-weight: bold; outline: none; }
        
        .btn-aktivasi { width: 100%; padding: 15px; background: #ff851b; color: white; border: none; font-weight: bold; font-size: 1rem; cursor: pointer; border-radius: 4px; box-shadow: 0 4px #a04e00; }
        .btn-aktivasi:active { transform: translateY(2px); box-shadow: 0 2px #a04e00; }

        /* FIX PETA HITAM */
        #map-wrapper { flex: 1; position: relative; height: 100%; background: #011425; }
        #map { height: 100% !important; width: 100% !important; }

        /* Marker Styling */
        .plane-box { text-align: center; }
        .plane-tag { background: #00ff00; color: #000; padding: 2px 5px; border-radius: 3px; font-weight: bold; font-size: 10px; display: block; margin-bottom: 2px; }
        
        #list-misi { background: #00142a; padding: 10px; max-height: 150px; overflow-y: auto; border-top: 1px solid #ff851b; }
        .card { background: #002d5a; border-left: 5px solid #ff851b; padding: 8px; margin-bottom: 5px; font-size: 0.8rem; position: relative; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="header">
            <h2 style="margin:0; font-size:1rem; color:#ff851b;">KODAL LOGISTIK KORPASGAT</h2>
            <div id="clock">00:00:00</div>
        </div>

        <div class="form-container">
            <div class="field"><label>Misi / Muatan</label><input type="text" id="misi" value="AMUNISI"></div>
            <div class="field"><label>POB (Personel)</label><input type="text" id="pob" value="ANAS"></div>
            <div class="field"><label>No Seri Pesawat</label><input type="text" id="pesawat" value="A-1234"></div>
            
            <div style="background: rgba(255,133,27,0.1); padding: 10px; border-radius: 4px;">
                <label style="color:#ff851b; font-size: 11px; font-weight: bold;">RUTE OPERASI</label>
                <div class="field" style="margin-top:8px;"><select id="asal"></select></div>
                <div class="field"><select id="tujuan"></select></div>
            </div>

            <button class="btn-aktivasi" onclick="kirimData()">🚀 AKTIVASI MISI RADAR</button>
        </div>

        <div id="list-misi"></div>
    </div>

    <div id="map-wrapper">
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBifnBivkGMG827wJGXhIDtjZ5EHNNtLp8",
            authDomain: "kodal-logistik-korpasgat.firebaseapp.com",
            projectId: "kodal-logistik-korpasgat",
            databaseURL: "https://kodal-logistik-korpasgat-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Inisialisasi Peta dengan cadangan
        const map = L.map('map', { zoomControl: false }).setView([-2.2, 118], 5);
        
        // Gunakan server citra satelit utama
        const baseLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Esri'
        }).addTo(map);

        // Tambahkan batas wilayah (border) agar peta tidak kosong saat citra gagal muat
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{y}/{x}.png', { opacity: 0.3 }).addTo(map);

        const bandara = [
            { n: "Lanud HLP (Jakarta)", lat: -6.2655, lng: 106.8906 },
            { n: "Lanud DMB (Balikpapan)", lat: -1.2683, lng: 116.8944 },
            { n: "Lanud IWI (Madiun)", lat: -7.6158, lng: 111.4338 },
            { n: "Lanud HND (Makassar)", lat: -5.0616, lng: 119.5539 },
            { n: "Lanud MUN (Biak)", lat: -1.1911, lng: 136.1086 }
        ];

        let markersAktif = {};

        db.ref('misi_logistik').on('value', (snapshot) => {
            const data = snapshot.val();
            Object.values(markersAktif).forEach(m => { map.removeLayer(m.icon); map.removeLayer(m.path); });
            markersAktif = {};
            
            if(data) {
                Object.keys(data).forEach(id => {
                    const d = data[id];
                    const iconHTML = L.divIcon({
                        className: 'plane-icon',
                        html: `<div class="plane-box"><span class="plane-tag">${d.pesawat}</span><i class="fa-solid fa-plane" style="color:${d.warna}; font-size:24px; transform:rotate(45deg);"></i></div>`,
                        iconSize: [40, 40], iconAnchor: [20, 20]
                    });
                    const marker = L.marker([d.lat, d.lng], { icon: iconHTML }).addTo(map);
                    const path = L.polyline([[d.lat, d.lng], [d.destLat, d.destLng]], { color: d.warna, weight: 2, dashArray: '5,10' }).addTo(map);
                    markersAktif[id] = { icon: marker, path: path };
                });
            }
            updateListUI(data);
        });

        function kirimData() {
            const a = document.getElementById('asal').value.split('|');
            const t = document.getElementById('tujuan').value.split('|');
            if(!a[0] || !t[0]) return alert("Pilih Rute!");

            const payload = {
                misi: document.getElementById('misi').value,
                pob: document.getElementById('pob').value,
                pesawat: document.getElementById('pesawat').value,
                lat: parseFloat(a[0]), lng: parseFloat(a[1]),
                destLat: parseFloat(t[0]), destLng: parseFloat(t[1]),
                warna: '#' + Math.floor(Math.random()*16777215).toString(16)
            };
            db.ref('misi_logistik').push(payload);
            map.flyTo([payload.lat, payload.lng], 7);
        }

        function updateListUI(data) {
            const list = document.getElementById('list-misi');
            list.innerHTML = "";
            if(data) Object.keys(data).forEach(id => {
                list.innerHTML += `<div class="card" style="border-color:${data[id].warna}"><b>${data[id].misi}</b><br>${data[id].pesawat} <button onclick="hapusMisi('${id}')" style="float:right; border:none; background:none; color:red; cursor:pointer;">✖</button></div>`;
            });
        }

        function hapusMisi(id) { db.ref('misi_logistik/'+id).remove(); }

        function init() {
            ['asal', 'tujuan'].forEach(id => {
                const sel = document.getElementById(id);
                sel.innerHTML = `<option value="">-- Pilih Bandara --</option>`;
                bandara.forEach(b => sel.innerHTML += `<option value="${b.lat}|${b.lng}">${b.n}</option>`);
            });
            setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID'); }, 1000);
            setTimeout(() => { map.invalidateSize(); }, 500); // Paksa peta kalkulasi ulang ukuran
        }
        init();
    </script>
</body>
</html>
