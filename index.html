<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kodal Logistik KORPASGAT - TV Monitoring</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Font Awesome untuk Ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #000; color: white; display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 450px; background: #001f3f; display: flex; flex-direction: column; border-right: 3px solid #ff851b; z-index: 1000; }
        #map-container { flex: 1; position: relative; background: #000; }
        #map { height: 100%; width: 100%; background: #011425; }

        .header { background: #002d5a; padding: 20px; text-align: center; border-bottom: 3px solid #ff851b; }
        .header h2 { margin: 0; font-size: 1.3rem; color: #ff851b; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Jam dan Kalender Real-time di Header */
        .live-info { margin-top: 10px; display: flex; flex-direction: column; gap: 5px; }
        #clock { font-size: 2.2rem; font-weight: bold; font-family: monospace; color: #00ff00; }
        #date-live { font-size: 1.1rem; color: #8cb4d6; font-weight: bold; }

        .form-section { padding: 15px; background: #002244; overflow-y: auto; border-bottom: 1px solid #113355; flex-shrink: 0; max-height: 50vh; }
        .input-group { margin-bottom: 12px; display: flex; flex-direction: column; }
        .input-group label { font-size: 0.9rem; margin-bottom: 5px; color: #8cb4d6; font-weight: bold; }
        .input-group label i { margin-right: 8px; color: #ff851b; }
        
        input, select { padding: 12px; font-size: 1rem; border-radius: 6px; border: 1px solid #ff851b; background: #001224; color: white; font-weight: bold; }
        button.btn-tambah { background: #ff851b; color: white; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 6px; width: 100%; font-size: 1.1rem; margin-top: 5px; transition: 0.3s; }
        button.btn-tambah:hover { background: #e07015; box-shadow: 0 0 15px rgba(255, 133, 27, 0.5); }

        .list-section { flex: 1; overflow-y: auto; padding: 15px; background: #001f3f; }
        .flight-card { background: #002d5a; border-left: 6px solid; border-radius: 8px; padding: 15px; margin-bottom: 15px; box-shadow: 0 6px 12px rgba(0,0,0,0.6); }
        
        .action-buttons { display: flex; gap: 10px; margin-top: 10px; }
        .btn-focus { background: #007bff; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-batal { background: #dc3545; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; width: 50px; }

        .tail-no { font-family: monospace; background: #000; padding: 2px 6px; border-radius: 4px; color: #00ff00; font-size: 0.85rem; border: 1px solid #333; }
        .plane-id-label { background: rgba(0,0,0,0.8); color: #00ff00; font-size: 12px; font-weight: bold; padding: 2px 6px; border-radius: 4px; border: 1px solid #ff851b; white-space: nowrap; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="header">
            <h2>KODAL LOGISTIK KORPASGAT</h2>
            <div class="live-info">
                <div id="date-live"><i class="fa-solid fa-calendar-day"></i> -- --- ----</div>
                <div id="clock"><i class="fa-solid fa-clock"></i> 00:00:00</div>
            </div>
        </div>

        <div class="form-section">
            <div class="input-group">
                <label><i class="fa-solid fa-box"></i> Misi / Barang</label>
                <input type="text" id="inp_barang" placeholder="Logistik Strategis">
            </div>
            <div class="input-group">
                <label><i class="fa-solid fa-user-tie"></i> Personel On Board</label>
                <input type="text" id="inp_kurir" placeholder="Mayor Pnb Budi">
            </div>
            <div class="input-group">
                <label><i class="fa-solid fa-calendar-check"></i> Jadwal Keberangkatan</label>
                <input type="datetime-local" id="inp_waktu">
            </div>
            <div class="input-group">
                <label><i class="fa-solid fa-plane-departure"></i> Pangkalan Asal</label>
                <select id="inp_asal"></select>
            </div>
            <div class="input-group">
                <label><i class="fa-solid fa-plane-arrival"></i> Pangkalan Tujuan</label>
                <select id="inp_tujuan"></select>
            </div>
            <button class="btn-tambah" onclick="prosesTambahPenerbangan()">
                <i class="fa-solid fa-paper-plane"></i> AKTIVASI ARMADA
            </button>
        </div>

        <div class="list-section" id="flight-list"></div>
    </div>

    <div id="map-container"><div id="map"></div></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Fungsi Set Waktu Default ke Input
        function setDefaultDateTime() {
            const now = new Date();
            const tzOffset = now.getTimezoneOffset() * 60000;
            const localISOTime = (new Date(now - tzOffset)).toISOString().slice(0, 16);
            document.getElementById('inp_waktu').value = localISOTime;
        }

        const daftarBandara = [
            { nama: "Jakarta (HLP) - Halim Perdanakusuma", lat: -6.2655, lng: 106.8906 },
            { nama: "Madiun (IWX) - Iswahjudi", lat: -7.6158, lng: 111.4338 },
            { nama: "Malang (MLG) - Abdul Rachman Saleh", lat: -7.9264, lng: 112.7135 },
            { nama: "Makassar (UPG) - Sultan Hasanuddin", lat: -5.0616, lng: 119.5539 },
            { nama: "Jayapura (DJJ) - Silas Papare", lat: -2.5765, lng: 140.5158 },
            { nama: "Biak (BIK) - Manuhua", lat: -1.1911, lng: 136.1086 },
            { nama: "Kupang (KOE) - El Tari", lat: -10.1705, lng: 123.6653 }
        ];

        function isiDropdown() {
            const dropdowns = ['inp_asal', 'inp_tujuan'];
            dropdowns.forEach(id => {
                const select = document.getElementById(id);
                daftarBandara.sort((a,b) => a.nama.localeCompare(b.nama)).forEach(b => {
                    select.innerHTML += `<option value="${b.lat},${b.lng},${b.nama}" ${id==='inp_asal'&&b.nama.includes('Halim')?'selected':''}>${b.nama}</option>`;
                });
            });
        }

        const map = L.map('map', { center: [-2.5, 118], zoom: 5 });
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}').addTo(map);

        let flights = [];
        let flightCounter = 0;
        const warnaMisi = ['#ff851b', '#00e5ff', '#39ff14', '#ff007f'];

        window.fokusPesawat = (id) => {
            const f = flights.find(x => x.id === id);
            if(f) map.setView(f.marker.getLatLng(), 8, { animate: true });
        };

        async function prosesTambahPenerbangan() {
            const barang = document.getElementById('inp_barang').value || "Misi Strategis";
            const kurir = document.getElementById('inp_kurir').value || "Personel KORPASGAT";
            const waktuDep = new Date(document.getElementById('inp_waktu').value);
            const tailNo = `A-13${Math.floor(10+Math.random()*89)}`;
            
            const asal = document.getElementById('inp_asal').value.split(',');
            const tuj = document.getElementById('inp_tujuan').value.split(',');
            const warna = warnaMisi[flightCounter % warnaMisi.length];

            const flight = {
                id: flightCounter++, tailNo, barang, kurir, warna,
                asal: {lat: parseFloat(asal[0]), lng: parseFloat(asal[1]), nama: asal[2]},
                tujuan: {lat: parseFloat(tuj[0]), lng: parseFloat(tuj[1]), nama: tuj[2]},
                depTime: waktuDep, status: "STANDBY",
                marker: L.marker([parseFloat(asal[0]), parseFloat(asal[1])], {
                    icon: L.divIcon({
                        html: `<div style="text-align:center"><div class="plane-id-label">${tailNo}</div><svg viewBox="0 0 100 100" width="60" height="60"><path fill="${warna}" d="M42 15 Q50 5 58 15 L58 85 Q50 95 42 85 Z"/><path fill="${warna}" d="M58 40 L98 46 L98 54 L58 50 Z"/><path fill="${warna}" d="M42 40 L2 46 L2 54 L42 50 Z"/></svg></div>`,
                        className: '', iconSize: [60, 80], iconAnchor: [30, 40]
                    }), opacity: 0
                }).addTo(map)
            };
            flights.push(flight); renderSidebar();
        }

        window.hapusPenerbangan = id => {
            const i = flights.findIndex(f => f.id === id);
            if(i > -1) { map.removeLayer(flights[i].marker); flights.splice(i, 1); renderSidebar(); }
        };

        function renderSidebar() {
            const list = document.getElementById('flight-list'); list.innerHTML = "";
            [...flights].reverse().forEach(f => {
                list.innerHTML += `
                    <div class="flight-card" style="border-left-color: ${f.warna}">
                        <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                            <span style="font-size:0.85rem; font-weight:bold;">${f.asal.nama.split('-')[0]} ➔ ${f.tujuan.nama.split('-')[0]}</span>
                            <span id="badge-${f.id}" class="status-badge status-menunggu">WAITING</span>
                        </div>
                        <div style="display:flex; gap:10px; align-items:center;">
                            <div style="flex:1">
                                <strong style="color:${f.warna}">${f.kurir} <span class="tail-no">${f.tailNo}</span></strong><br>
                                <span style="font-size:0.8rem; color:#b3cde0">📦 ${f.barang}</span>
                            </div>
                        </div>
                        <div class="action-buttons">
                            <button class="btn-focus" onclick="fokusPesawat(${f.id})"><i class="fa-solid fa-crosshairs"></i> FOCUS</button>
                            <button class="btn-batal" onclick="hapusPenerbangan(${f.id})">❌</button>
                        </div>
                    </div>`;
            });
        }

        // Jalankan Fungsi Saat Load
        isiDropdown();
        setDefaultDateTime();

        // Update Jam & Kalender Real-time
        setInterval(() => {
            const now = new Date();
            const options = { day: '2-digit', month: 'long', year: 'numeric' };
            document.getElementById('date-live').innerHTML = `<i class="fa-solid fa-calendar-day"></i> ` + now.toLocaleDateString('id-ID', options);
            document.getElementById('clock').innerHTML = `<i class="fa-solid fa-clock"></i> ` + now.toLocaleTimeString('id-ID') + " WIB";
            
            flights.forEach(f => {
                const badge = document.getElementById(`badge-${f.id}`);
                if (now >= f.depTime) {
                    f.status = "TERBANG"; f.marker.setOpacity(1);
                    if(badge) { badge.innerText = "AIRBORNE"; badge.className = "status-badge status-terbang"; }
                }
            });
        }, 1000);
    </script>
</body>
</html>
