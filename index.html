<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kodal Logistik KORPASGAT - Ultimate Cloud Tracking</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    
    <!-- SDK FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #000; color: white; display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 460px; background: #001f3f; display: flex; flex-direction: column; border-right: 3px solid #ff851b; z-index: 1000; }
        #map-container { flex: 1; position: relative; background: #000; }
        #map { height: 100%; width: 100%; background: #011425; }

        .header { background: #002d5a; padding: 20px; text-align: center; border-bottom: 3px solid #ff851b; }
        .header h2 { margin: 0; font-size: 1.3rem; color: #ff851b; text-transform: uppercase; letter-spacing: 2px; }
        
        #date-live { font-size: 1.1rem; color: #fff; font-weight: bold; margin-top: 5px; }
        #clock-live { font-size: 2.2rem; font-weight: bold; font-family: monospace; color: #00ff00; text-shadow: 0 0 10px #00ff00; margin-top: 5px; }

        .form-section { padding: 15px; background: #002244; overflow-y: auto; border-bottom: 1px solid #113355; flex-shrink: 0; max-height: 38vh; }
        .input-group { margin-bottom: 10px; display: flex; flex-direction: column; }
        .input-group label { font-size: 0.85rem; margin-bottom: 4px; color: #8cb4d6; font-weight: bold; }
        
        input, select { padding: 10px; font-size: 0.95rem; border-radius: 6px; border: 1px solid #ff851b; background: #001224; color: white; font-weight: bold; }
        input[type="file"] { font-size: 0.8rem; background: #001224; border: 1px dashed #ff851b; padding: 5px; cursor: pointer; }
        
        button.btn-tambah { background: #ff851b; color: white; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 6px; width: 100%; font-size: 1.1rem; margin-top: 5px; transition: 0.3s; }
        button.btn-tambah:hover { background: #e67616; transform: scale(1.02); }

        .list-section { flex: 1; overflow-y: auto; padding: 15px; background: #001f3f; }
        
        /* CARD MISI STYLING */
        .flight-card { background: #002d5a; border-left: 6px solid; border-radius: 10px; padding: 15px; margin-bottom: 15px; border: 1px solid #113355; position: relative; transition: 0.5s; }
        .flight-card.arrived { border-left-color: #00ff00 !important; background: #004d33 !important; border: 2px solid #00ff00; box-shadow: 0 0 15px rgba(0,255,0,0.4); }
        
        .action-btns { position: absolute; top: 10px; right: 10px; display: flex; gap: 12px; }
        .btn-edit { background: none; border: none; color: #ffc107; cursor: pointer; font-size: 1.1rem; }
        .btn-cancel { background: none; border: none; color: #dc3545; cursor: pointer; font-size: 1.2rem; }

        .card-main-body { display: flex; gap: 15px; align-items: center; margin-top: 10px; }
        .card-main-body img { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; border: 3px solid; }
        
        .time-box { display: flex; justify-content: space-between; background: rgba(0,0,0,0.4); padding: 8px; border-radius: 5px; margin-top: 10px; font-family: monospace; font-size: 0.9rem; color: #fff; }

        .btn-focus-card { background: #007bff; color: white; border: none; padding: 10px; border-radius: 5px; font-weight: bold; width: 100%; cursor: pointer; font-size: 0.9rem; margin-top: 10px; text-transform: uppercase; }
        .success-label { display: none; color: #00ff00; font-weight: bold; font-size: 0.85rem; text-align: center; margin-top: 10px; text-transform: uppercase; border-top: 1px solid #00ff00; padding-top: 5px; }
        .flight-card.arrived .success-label { display: block; }

        /* PESAWAT DI PETA */
        .plane-wrapper { display: flex; flex-direction: column; align-items: center; position: relative; transition: all 1s linear; }
        .pilot-photo-map { width: 65px; height: 65px; border-radius: 50%; border: 3px solid #fff; object-fit: cover; box-shadow: 0 0 10px #000; }
        .serial-txt-map { color: #0f0; font-family: monospace; font-weight: bold; font-size: 1.2rem; text-shadow: 2px 2px 4px #000; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="header">
            <h2>KODAL LOGISTIK KORPASGAT</h2>
            <div id="date-live">-- --- ----</div>
            <div id="clock-live">00:00:00</div>
        </div>

        <div class="form-section">
            <input type="hidden" id="edit_fbId" value="">
            <div class="input-group"><label>Misi / Logistik</label><input type="text" id="inp_barang" placeholder="Amunisi"></div>
            <div class="input-group"><label>Personel On Board</label><input type="text" id="inp_kurir" placeholder="Nama Lengkap"></div>
            <div class="input-group"><label>Jenis & No Seri</label><input type="text" id="inp_pesawat" placeholder="Hercules / A-1301"></div>
            <div class="input-group"><label>Insert Foto</label><input type="file" id="inp_foto" accept="image/*"></div>
            <div class="input-group"><label>Jadwal Take Off (WIB)</label><input type="datetime-local" id="inp_waktu"></div>
            
            <label style="color: #ff851b; font-size: 0.8rem; font-weight: bold; margin: 5px 0; display: block;">NAVIGASI RUTE MULTI-TRANSIT</label>
            <div class="input-group"><label>1. Asal</label><select id="inp_asal"></select></div>
            <div class="input-group"><label>2. Transit 1</label><select id="inp_transit1"></select></div>
            <div class="input-group"><label>3. Transit 2</label><select id="inp_transit2"></select></div>
            <div class="input-group"><label>4. Tujuan Akhir</label><select id="inp_tujuan"></select></div>
            <div class="input-group"><label>5. Kembali ke Base</label><select id="inp_kembali"></select></div>
            
            <button class="btn-tambah" id="btn_submit" onclick="prosesTambahPenerbangan()">🚀 AKTIVASI MISI CLOUD</button>
        </div>

        <div class="list-section" id="flight-list"></div>
    </div>

    <div id="map-container"><div id="map"></div></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- KONFIGURASI FIREBASE PUTRI ---
        const firebaseConfig = {
            apiKey: "AIzaSyBifnBivkGMG827wJGXhIDtjZ5EHNNtLp8",
            authDomain: "kodal-logistik-korpasgat.firebaseapp.com",
            projectId: "kodal-logistik-korpasgat",
            storageBucket: "kodal-logistik-korpasgat.firebasestorage.app",
            messagingSenderId: "533092732764",
            appId: "1:533092732764:web:ac77a04f83a12e69667b99",
            databaseURL: "https://kodal-logistik-korpasgat-default-rtdb.firebaseio.com"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const map = L.map('map').setView([-2.2, 118], 5);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        const daftarBandara = [
       // SUMATERA & BARAT
            { nama: "Sabang (SBG) - Lanud Maimun Saleh", lat: 5.8753, lng: 95.3375 },
            { nama: "Banda Aceh (BTJ) - Sultan Iskandar Muda", lat: 5.5239, lng: 95.4197 },
            { nama: "Medan (MES) - Lanud Soewondo", lat: 3.5623, lng: 98.6837 },
            { nama: "Pekanbaru (PKU) - Lanud Roesmin Nurjadin", lat: 0.4611, lng: 101.4483 },
            { nama: "Ranai (NTX) - Lanud Raden Sadjad (Natuna)", lat: 3.9453, lng: 108.3871 },
            { nama: "Palembang (PLM) - Lanud Sri Mulyono Herlambang", lat: -2.8981, lng: 104.7001 },
            // JAWA
            { nama: "Jakarta (HLP) - Lanud Halim Perdanakusuma", lat: -6.2655, lng: 106.8906 },
            { nama: "Bandung (BDO) - Lanud Husein Sastranegara", lat: -6.9009, lng: 107.5768 },
            { nama: "Madiun (IWX) - Lanud Iswahjudi", lat: -7.6158, lng: 111.4338 },
            { nama: "Malang (MLG) - Lanud Abdul Rachman Saleh", lat: -7.9264, lng: 112.7135 },
            // KALIMANTAN
            { nama: "Pontianak (PNK) - Lanud Supadio", lat: -0.1507, lng: 109.4039 },
            { nama: "Balikpapan (BPN) - Lanud Dhomber", lat: -1.2683, lng: 116.8944 },
            { nama: "Tarakan (TRK) - Lanud Anang Busra", lat: 3.3262, lng: 117.5647 },
            // SULAWESI & TENGAH
            { nama: "Makassar (UPG) - Lanud Sultan Hasanuddin", lat: -5.0616, lng: 119.5539 },
            { nama: "Manado (MDC) - Lanud Sam Ratulangi", lat: 1.5492, lng: 124.9268 },
            // BALI & NUSA TENGGARA
            { nama: "Denpasar (DPS) - Ngurah Rai", lat: -8.7481, lng: 115.1671 },
            { nama: "Kupang (KOE) - Lanud El Tari", lat: -10.1705, lng: 123.6653 },
            // PAPUA & TIMUR
            { nama: "Ambon (AMQ) - Lanud Pattimura", lat: -3.7049, lng: 128.0890 },
            { nama: "Biak (BIK) - Lanud Manuhua", lat: -1.1911, lng: 136.1086 },
            { nama: "Jayapura (DJJ) - Lanud Silas Papare", lat: -2.5765, lng: 140.5158 },
            { nama: "Timika (TIM) - Lanud Yohanis Kapiyau", lat: -4.5296, lng: 136.8870 },
            { nama: "Merauke (MKQ) - Lanud J.A. Dimara", lat: -8.5208, lng: 140.4184 }
        ];

        let flights = [];
        const SPEED_HERCULES = 540;

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; const dLat = (lat2-lat1)*Math.PI/180; const dLon = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        db.ref('misi_logistik').on('value', (snapshot) => {
            flights.forEach(f => { if(f.marker) map.removeLayer(f.marker); if(f.line) map.removeLayer(f.line); if(f.labels) f.labels.forEach(l => map.removeLayer(l)); });
            flights = [];
            const data = snapshot.val();
            if (data) {
                Object.keys(data).forEach(id => {
                    const f = data[id]; f.fbId = id; f.depTime = new Date(f.depTimeStr); f.eta = new Date(f.etaStr);
                    initFlightMarker(f); flights.push(f);
                });
            }
            renderSidebar();
        });

        function initFlightMarker(f) {
            const markerHTML = `<div class="plane-wrapper" id="plane-${f.fbId}">
                <div style="position:absolute; top:-100px; text-align:center; min-width:160px;">
                    <img src="${f.fotoUrl}" class="pilot-photo-map">
                    <div class="serial-txt-map">${f.pesawat}</div>
                </div>
                <svg viewBox="0 0 100 100" width="55" height="55" id="svg-${f.fbId}">
                    <path d="M50 5 L90 90 L50 70 L10 90 Z" fill="${f.warna}" stroke="#fff" stroke-width="3"/>
                </svg></div>`;

            f.marker = L.marker([f.rute[0].lat, f.rute[0].lng], {
                icon: L.divIcon({ html: markerHTML, className: 'p-marker', iconSize: [100, 100], iconAnchor: [50, 50] }), opacity: 0
            }).addTo(map);

            f.line = L.polyline(f.rute.map(r=>[r.lat, r.lng]), {color: f.warna, weight: 2, dashArray: '5, 10'}).addTo(map);
            f.labels = f.rute.map((r, i) => L.marker([r.lat, r.lng], {
                icon: L.divIcon({ html: `<span style="color:#ffee00; font-weight:bold; text-shadow:2px 2px 4px #000; font-size:14px;">${r.nama.split('-')[0]}</span>`, className: 'airport-label' })
            }).addTo(map));
        }

        async function prosesTambahPenerbangan() {
            const fbId = document.getElementById('edit_fbId').value;
            const barang = document.getElementById('inp_barang').value;
            const kurir = document.getElementById('inp_kurir').value || "AU";
            const pesawat = document.getElementById('inp_pesawat').value || "A-1301";
            const waktuVal = document.getElementById('inp_waktu').value;
            
            if (!barang || !waktuVal) { alert("Mohon isi Misi dan Jadwal Take Off!"); return; }

            const depTime = new Date(waktuVal);
            const file = document.getElementById('inp_foto').files[0];
            let fotoUrl = document.getElementById('edit_fbId').dataset.oldFoto || "https://ui-avatars.com/api/?name=" + kurir.replace(' ','+');
            
            if (file) { fotoUrl = await new Promise(r => { const f = new FileReader(); f.onload = e => r(e.target.result); f.readAsDataURL(file); }); }

            const ruteIds = ['inp_asal', 'inp_transit1', 'inp_transit2', 'inp_tujuan', 'inp_kembali'];
            const rute = [];
            ruteIds.forEach(id => {
                const val = document.getElementById(id).value;
                if (val) { const d = val.split(','); rute.push({ lat: parseFloat(d[0]), lng: parseFloat(d[1]), nama: d[2], rawVal: val }); }
            });

            if (rute.length < 2) { alert("Minimal tentukan Asal dan Tujuan!"); return; }

            let totalDist = 0;
            for (let i = 0; i < rute.length - 1; i++) { totalDist += calculateDistance(rute[i].lat, rute[i].lng, rute[i+1].lat, rute[i+1].lng); }
            const hours = totalDist / SPEED_HERCULES;
            const eta = new Date(depTime.getTime() + (hours * 3600000));

            const payload = {
                barang, kurir, pesawat, fotoUrl, rute,
                depTimeStr: depTime.toISOString(),
                etaStr: eta.toISOString(),
                status: "STANDBY",
                warna: document.getElementById('edit_fbId').dataset.oldWarna || '#' + Math.floor(Math.random()*16777215).toString(16),
                duration: `${Math.floor(hours)}j ${Math.round((hours % 1) * 60)}m`
            };

            if (fbId) { db.ref('misi_logistik/' + fbId).update(payload).then(() => resetForm()); }
            else { db.ref('misi_logistik').push(payload).then(() => resetForm()); }
        }

        function editMisi(id) {
            const f = flights.find(x => x.fbId === id);
            if(!f) return;
            document.getElementById('edit_fbId').value = f.fbId;
            document.getElementById('edit_fbId').dataset.oldFoto = f.fotoUrl;
            document.getElementById('edit_fbId').dataset.oldWarna = f.warna;
            document.getElementById('inp_barang').value = f.barang;
            document.getElementById('inp_kurir').value = f.kurir;
            document.getElementById('inp_pesawat').value = f.pesawat;
            const dt = new Date(f.depTime);
            dt.setMinutes(dt.getMinutes() - dt.getTimezoneOffset());
            document.getElementById('inp_waktu').value = dt.toISOString().slice(0,16);
            const ids = ['inp_asal', 'inp_transit1', 'inp_transit2', 'inp_tujuan', 'inp_kembali'];
            ids.forEach((id, index) => { document.getElementById(id).value = f.rute[index] ? f.rute[index].rawVal : ""; });
            document.getElementById('btn_submit').innerText = "💾 UPDATE MISI CLOUD";
            document.querySelector('.form-section').scrollTop = 0;
        }

        function resetForm() {
            document.getElementById('edit_fbId').value = "";
            document.getElementById('inp_barang').value = "";
            document.getElementById('inp_kurir').value = "";
            document.getElementById('inp_pesawat').value = "";
            document.getElementById('inp_waktu').value = "";
            document.getElementById('inp_foto').value = "";
            document.getElementById('btn_submit').innerText = "🚀 AKTIVASI MISI CLOUD";
        }

        function renderSidebar() {
            const list = document.getElementById('flight-list'); list.innerHTML = "";
            [...flights].reverse().forEach(f => {
                const ruteTxt = f.rute.map(t => t.nama.split('-')[0].trim()).join(' ➔ ');
                list.innerHTML += `<div class="flight-card" id="card-${f.fbId}" style="border-left-color:${f.warna}">
                    <div class="action-btns">
                        <button class="btn-edit" onclick="editMisi('${f.fbId}')"><i class="fa-solid fa-pen-to-square"></i></button>
                        <button class="btn-cancel" onclick="hapusMisi('${f.fbId}')">❌</button>
                    </div>
                    <div style="font-size:0.75rem; font-weight:bold; color:#fff; margin-bottom:8px; padding-right:50px;">${ruteTxt}</div>
                    <div class="card-main-body">
                        <img src="${f.fotoUrl}" style="border-color:${f.warna}">
                        <div>
                            <div style="font-weight:bold; color:#ff851b; font-size:1rem;">${f.barang}</div>
                            <div style="font-size:0.85rem; color:#fff;">${f.kurir} - <span style="color:#00ff00;">${f.pesawat}</span></div>
                            <div style="font-size:0.75rem; color:#ffee00;">DURASI: ${f.duration}</div>
                        </div>
                    </div>
                    <div class="time-box">
                        <span>T/O: ${f.depTime.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</span>
                        <span>ETA: ${f.eta.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</span>
                    </div>
                    <div class="success-label">✅ ARRIVED AT DESTINATION</div>
                    <button class="btn-focus-card" onclick="map.setView(flights.find(x=>x.fbId==='${f.fbId}').marker.getLatLng(), 8)">🎯 FOCUS PESAWAT</button>
                </div>`;
            });
        }

        function hapusMisi(id) { if(confirm("Hapus misi logistik?")) db.ref('misi_logistik/' + id).remove(); }

        setInterval(() => {
            const now = new Date();
            document.getElementById('clock-live').innerText = now.toLocaleTimeString('id-ID');
            document.getElementById('date-live').innerText = now.toLocaleDateString('id-ID', {day:'2-digit', month:'long', year:'numeric'});

            flights.forEach(f => {
                const card = document.getElementById(`card-${f.fbId}`);
                if (now < f.depTime) return;
                if (now >= f.eta) {
                    f.marker.setLatLng([f.rute[f.rute.length-1].lat, f.rute[f.rute.length-1].lng]).setOpacity(1);
                    if(card) card.classList.add('arrived');
                } else {
                    f.marker.setOpacity(1);
                    const totalDur = f.eta - f.depTime; const elapsed = now - f.depTime; const progress = elapsed / totalDur;
                    const segmentCount = f.rute.length - 1;
                    const segmentIdx = Math.min(Math.floor(progress * segmentCount), segmentCount - 1);
                    const segProgress = (progress * segmentCount) % 1;
                    const p1 = f.rute[segmentIdx]; const p2 = f.rute[segmentIdx + 1];
                    const lat = p1.lat + (p2.lat - p1.lat) * segProgress;
                    const lng = p1.lng + (p2.lng - p1.lng) * segProgress;
                    f.marker.setLatLng([lat, lng]);
                    const svg = document.getElementById(`svg-${f.fbId}`);
                    if(svg) { const angle = Math.atan2(p2.lng - p1.lng, p2.lat - p1.lat) * 180 / Math.PI; svg.style.transform = `rotate(${angle}deg)`; }
                }
            });
        }, 1000);

        function isiDropdown() {
            const ids = ['inp_asal', 'inp_transit1', 'inp_transit2', 'inp_tujuan', 'inp_kembali'];
            ids.forEach(id => {
                const sel = document.getElementById(id);
                if(!id.includes('asal') && !id.includes('tujuan')) sel.innerHTML = '<option value="">-- Lewati --</option>';
                daftarBandara.forEach(b => { sel.innerHTML += `<option value="${b.lat},${b.lng},${b.nama}">${b.nama}</option>`; });
            });
        }
        isiDropdown();
    </script>
</body>
</html>
