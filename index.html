<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kodal Logistik KORPASGAT - Ultimate Cloud Tracking</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    
    <!-- SDK FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        /* CSS FIX: Memastikan Sidebar & Map muncul sesuai layout di screenshot awal */
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #000; color: white; display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 460px; background: #001f3f; display: flex; flex-direction: column; border-right: 3px solid #ff851b; z-index: 1000; flex-shrink: 0; }
        #map-container { flex: 1; position: relative; background: #000; }
        #map { height: 100%; width: 100%; background: #011425; }

        .header { background: #002d5a; padding: 20px; text-align: center; border-bottom: 3px solid #ff851b; }
        .header h2 { margin: 0; font-size: 1.3rem; color: #ff851b; text-transform: uppercase; letter-spacing: 2px; }
        #clock-live { font-size: 2.2rem; font-weight: bold; font-family: monospace; color: #00ff00; text-shadow: 0 0 10px #00ff00; }

        .form-section { padding: 15px; background: #002244; overflow-y: auto; max-height: 45vh; border-bottom: 1px solid #113355; }
        .input-group { margin-bottom: 10px; display: flex; flex-direction: column; }
        .input-group label { font-size: 0.85rem; margin-bottom: 4px; color: #8cb4d6; font-weight: bold; }
        
        input, select { padding: 10px; font-size: 0.95rem; border-radius: 6px; border: 1px solid #ff851b; background: #001224; color: white; font-weight: bold; }
        button.btn-tambah { background: #ff851b; color: white; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 6px; width: 100%; font-size: 1.1rem; margin-top: 10px; }

        .list-section { flex: 1; overflow-y: auto; padding: 15px; background: #001f3f; }
        .flight-card { background: #002d5a; border-left: 6px solid; border-radius: 10px; padding: 15px; margin-bottom: 15px; border: 1px solid #113355; position: relative; }
        
        /* Gaya Marker Pesawat di Peta */
        .plane-wrapper { display: flex; flex-direction: column; align-items: center; position: relative; }
        .pilot-photo-map { width: 60px; height: 60px; border-radius: 50%; border: 3px solid #fff; object-fit: cover; box-shadow: 0 0 10px #000; background: #222; }
        .serial-txt-map { color: #0f0; font-family: monospace; font-weight: bold; font-size: 1rem; text-shadow: 2px 2px 4px #000; background: rgba(0,0,0,0.7); padding: 2px 5px; border-radius: 4px; }
        
        .card-main-body { display: flex; gap: 15px; align-items: center; }
        .card-main-body img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #ff851b; object-fit: cover; }
        
        .nav-time-panel { display: grid; grid-template-columns: 1fr 1fr 1fr; background: rgba(0,0,0,0.4); margin-top: 10px; padding: 8px; border-radius: 5px; text-align: center; }
        .time-label { font-size: 0.65rem; color: #8cb4d6; display: block; }
        .time-val { font-family: monospace; font-size: 0.9rem; color: #00ff00; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: 50vh; }
            #map-container { height: 50vh; }
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="header">
            <h2>KODAL LOGISTIK KORPASGAT</h2>
            <div id="date-live">-- --- ----</div>
            <div id="clock-live">00:00:00</div>
        </div>

        <div class="form-section">
            <input type="hidden" id="edit_fbId" value="">
            <div class="input-group"><label>Misi / Logistik</label><input type="text" id="inp_barang" placeholder="Contoh: Amunisi Arhanud"></div>
            <div class="input-group"><label>Personel On Board</label><input type="text" id="inp_kurir" placeholder="Nama Pilot/Operator"></div>
            <div class="input-group"><label>Jenis & No Seri</label><input type="text" id="inp_pesawat" placeholder="Hercules / A-1301"></div>
            <div class="input-group"><label>Foto (Wajib/Pilih File)</label><input type="file" id="inp_foto" accept="image/*"></div>
            <div class="input-group"><label>Jadwal Take Off (WIB)</label><input type="datetime-local" id="inp_waktu"></div>
            
            <div class="input-group"><label>1. Asal</label><select id="inp_asal"></select></div>
            <div class="input-group"><label>2. Transit 1 (Opsional)</label><select id="inp_transit1"></select></div>
            <div class="input-group"><label>3. Transit 2 (Opsional)</label><select id="inp_transit2"></select></div>
            <div class="input-group"><label>4. Tujuan Akhir</label><select id="inp_tujuan"></select></div>
            
            <button class="btn-tambah" id="btn_submit" onclick="prosesTambahPenerbangan()">🚀 AKTIVASI MISI CLOUD</button>
        </div>

        <div class="list-section" id="flight-list"></div>
    </div>

    <div id="map-container"><div id="map"></div></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Konfigurasi Database Anda
        const firebaseConfig = {
            apiKey: "AIzaSyBifnBivkGMG827wJGXhIDtjZ5EHNNtLp8",
            authDomain: "kodal-logistik-korpasgat.firebaseapp.com",
            projectId: "kodal-logistik-korpasgat",
            databaseURL: "https://kodal-logistik-korpasgat-default-rtdb.firebaseio.com"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const map = L.map('map').setView([-2.2, 118], 5);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        const daftarBandara = [
            { nama: "Jakarta (HLP) - Lanud Halim Perdanakusuma", lat: -6.2655, lng: 106.8906 },
            { nama: "Madiun (IWX) - Lanud Iswahjudi", lat: -7.6158, lng: 111.4338 },
            { nama: "Balikpapan (BPN) - Lanud Dhomber", lat: -1.2683, lng: 116.8944 },
            { nama: "Makassar (UPG) - Lanud Sultan Hasanuddin", lat: -5.0616, lng: 119.5539 },
            { nama: "Jayapura (DJJ) - Lanud Silas Papare", lat: -2.5765, lng: 140.5158 },
            { nama: "Sabang (SBG) - Lanud Maimun Saleh", lat: 5.8753, lng: 95.3375 }
        ];

        let flights = [];
        const SPEED_HERCULES = 540; 

        // Fungsi Load Dropdown
        function isiDropdown() {
            const ids = ['inp_asal', 'inp_transit1', 'inp_transit2', 'inp_tujuan'];
            ids.forEach(id => {
                const sel = document.getElementById(id);
                sel.innerHTML = id.includes('transit') ? '<option value="">-- Lewati --</option>' : '';
                daftarBandara.forEach(b => { sel.innerHTML += `<option value="${b.lat},${b.lng},${b.nama}">${b.nama}</option>`; });
            });
        }
        isiDropdown();

        // REALTIME LISTENER
        db.ref('misi_logistik').on('value', (snapshot) => {
            flights.forEach(f => { if(f.marker) map.removeLayer(f.marker); if(f.line) map.removeLayer(f.line); });
            flights = [];
            const data = snapshot.val();
            if (data) {
                Object.keys(data).forEach(id => {
                    const f = data[id]; f.fbId = id;
                    renderFlightOnMap(f);
                    flights.push(f);
                });
            }
            renderSidebar();
        });

        function renderFlightOnMap(f) {
            const markerHTML = `
                <div class="plane-wrapper">
                    <div style="position:absolute; top:-85px; text-align:center; min-width:120px;">
                        <img src="${f.fotoUrl}" class="pilot-photo-map">
                        <div class="serial-txt-map">${f.pesawat}</div>
                    </div>
                    <svg viewBox="0 0 100 100" width="40" height="40" id="svg-${f.fbId}">
                        <path d="M50 5 L90 90 L50 70 L10 90 Z" fill="${f.warna || '#ff851b'}" stroke="#fff" stroke-width="3"/>
                    </svg>
                </div>`;

            const pos = f.rute[f.currentStep || 0];
            f.marker = L.marker([pos.lat, pos.lng], {
                icon: L.divIcon({ html: markerHTML, className: 'p-marker', iconSize: [40, 40], iconAnchor: [20, 20] })
            }).addTo(map);

            f.line = L.polyline(f.rute.map(r=>[r.lat, r.lng]), { color: f.warna, weight: 3, dashArray: '10, 10', opacity: 0.5 }).addTo(map);
        }

        async function prosesTambahPenerbangan() {
            const btn = document.getElementById('btn_submit');
            btn.disabled = true; btn.innerText = "⏳ MEMPROSES...";

            const barang = document.getElementById('inp_barang').value;
            const kurir = document.getElementById('inp_kurir').value || "AU";
            const pesawat = document.getElementById('inp_pesawat').value || "A-1301";
            const waktuVal = document.getElementById('inp_waktu').value;
            const file = document.getElementById('inp_foto').files[0];

            if (!barang || !waktuVal) { alert("Misi & Waktu Wajib Diisi!"); btn.disabled = false; return; }

            // Logika Foto Fallback
            let fotoUrl = "https://ui-avatars.com/api/?name=" + kurir.replace(' ','+');
            if (file) {
                fotoUrl = await new Promise(r => { 
                    const fr = new FileReader(); 
                    fr.onload = e => r(e.target.result); 
                    fr.readAsDataURL(file); 
                });
            }

            const rute = [];
            ['inp_asal', 'inp_transit1', 'inp_transit2', 'inp_tujuan'].forEach(id => {
                const val = document.getElementById(id).value;
                if (val) { const d = val.split(','); rute.push({ lat: parseFloat(d[0]), lng: parseFloat(d[1]), nama: d[2] }); }
            });

            const payload = {
                barang, kurir, pesawat, fotoUrl, rute,
                status: "STANDBY", currentStep: 0, isWaiting: true,
                warna: '#' + Math.floor(Math.random()*16777215).toString(16),
                etd: "--:--", eta: "--:--", eet: "--:--"
            };

            db.ref('misi_logistik').push(payload).then(() => {
                alert("Misi Diaktifkan!");
                btn.disabled = false; btn.innerText = "🚀 AKTIVASI MISI CLOUD";
            });
        }

        function renderSidebar() {
            const list = document.getElementById('flight-list');
            list.innerHTML = "";
            flights.forEach(f => {
                list.innerHTML += `
                    <div class="flight-card" style="border-left-color:${f.warna}">
                        <div class="card-main-body">
                            <img src="${f.fotoUrl}">
                            <div>
                                <div style="font-weight:bold; color:#ff851b;">${f.barang}</div>
                                <div style="font-size:0.8rem;">${f.pesawat} - ${f.kurir}</div>
                            </div>
                        </div>
                        <div class="nav-time-panel">
                            <div><span class="time-label">ETD</span><span class="time-val">${f.etd}</span></div>
                            <div><span class="time-label">EET</span><span class="time-val">${f.eet}</span></div>
                            <div><span class="time-label">ETA</span><span class="time-val">${f.eta}</span></div>
                        </div>
                    </div>`;
            });
        }

        setInterval(() => {
            const now = new Date();
            document.getElementById('clock-live').innerText = now.toLocaleTimeString('id-ID');
            document.getElementById('date-live').innerText = now.toLocaleDateString('id-ID', {day:'2-digit', month:'long', year:'numeric'});
        }, 1000);
    </script>
</body>
</html>
