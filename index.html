<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>KORPASGAT TACTICAL RADAR V4.0 - FINAL FIX</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --accent: #ff851b; --bg: #0d1117; }
        body { margin: 0; display: flex; height: 100vh; font-family: sans-serif; background: var(--bg); color: white; overflow: hidden; }
        #sidebar { width: 380px; background: #161b22; border-right: 1px solid #30363d; display: flex; flex-direction: column; z-index: 1000; }
        .header { background: #010409; padding: 15px; text-align: center; border-bottom: 2px solid var(--accent); }
        #clock { font-size: 1.5rem; color: #00ff00; font-family: monospace; }
        .form { padding: 15px; border-bottom: 1px solid #30363d; }
        input, select { width: 100%; padding: 8px; margin: 5px 0; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 4px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: var(--accent); border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 4px; margin-top: 10px; }
        #map { flex: 1; background: #000; }
        
        /* CSS KHUSUS ROTASI */
        .plane-wrapper { position: relative; }
        .plane-label { 
            position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); padding: 2px 5px; border-radius: 3px;
            font-size: 10px; border: 1px solid var(--accent); white-space: nowrap;
        }
        .rotated-plane { display: inline-block; transition: none; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="header">
        <div style="font-size: 10px; color: var(--accent);">KORPASGAT TACTICAL RADAR</div>
        <div id="clock">00:00:00</div>
    </div>
    <div class="form">
        <label style="font-size:10px;">CALLSIGN</label>
        <input type="text" id="pesawat" value="C-130">
        <div style="display:flex; gap:5px;">
            <select id="asal"></select>
            <select id="tujuan"></select>
        </div>
        <input type="datetime-local" id="takeoff">
        <div style="display:flex; gap:5px;">
            <select id="tipe" style="flex:2;"><option value="500">HERCULES (500 km/h)</option></select>
            <input type="color" id="warna" value="#ff851b" style="flex:1;">
        </div>
        <button class="btn" onclick="kirimMisi()">🚀 DEPLOY MISSION</button>
    </div>
    <div id="flight-list" style="flex:1; overflow-y:auto; padding:10px; background:#010409;"></div>
</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const firebaseConfig = { databaseURL: "https://kodal-logistik-korpasgat-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const map = L.map('map', { zoomControl: false }).setView([-2.5, 118], 5);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

    const lanuds = [
             { nama: "Sabang (SBG) - Lanud Maimun Saleh", lat: 5.8753, lng: 95.3375 },
            { nama: "Banda Aceh (BTJ) - Sultan Iskandar Muda", lat: 5.5239, lng: 95.4197 },
            { nama: "Medan (MES) - Lanud Soewondo", lat: 3.5623, lng: 98.6837 },
            { nama: "Pekanbaru (PKU) - Lanud Roesmin Nurjadin", lat: 0.4611, lng: 101.4483 },
            { nama: "Ranai (NTX) - Lanud Raden Sadjad (Natuna)", lat: 3.9453, lng: 108.3871 },
            { nama: "Palembang (PLM) - Lanud Sri Mulyono Herlambang", lat: -2.8981, lng: 104.7001 },
            { nama: "Jakarta (HLP) - Lanud Halim Perdanakusuma", lat: -6.2655, lng: 106.8906 },
            { nama: "Bandung (BDO) - Lanud Husein Sastranegara", lat: -6.9009, lng: 107.5768 },
            { nama: "Madiun (IWX) - Lanud Iswahjudi", lat: -7.6158, lng: 111.4338 },
            { nama: "Malang (MLG) - Lanud Abdul Rachman Saleh", lat: -7.9264, lng: 112.7135 },
            { nama: "Pontianak (PNK) - Lanud Supadio", lat: -0.1507, lng: 109.4039 },
            { nama: "Balikpapan (BPN) - Lanud Dhomber", lat: -1.2683, lng: 116.8944 },
            { nama: "Tarakan (TRK) - Lanud Anang Busra", lat: 3.3262, lng: 117.5647 },
            { nama: "Makassar (UPG) - Lanud Sultan Hasanuddin", lat: -5.0616, lng: 119.5539 },
            { nama: "Manado (MDC) - Lanud Sam Ratulangi", lat: 1.5492, lng: 124.9268 },
            { nama: "Denpasar (DPS) - Ngurah Rai", lat: -8.7481, lng: 115.1671 },
            { nama: "Kupang (KOE) - Lanud El Tari", lat: -10.1705, lng: 123.6653 },
            { nama: "Ambon (AMQ) - Lanud Pattimura", lat: -3.7049, lng: 128.0890 },
            { nama: "Biak (BIK) - Lanud Manuhua", lat: -1.1911, lng: 136.1086 },
            { nama: "Jayapura (DJJ) - Lanud Silas Papare", lat: -2.5765, lng: 140.5158 },
            { nama: "Timika (TIM) - Lanud Yohanis Kapiyau", lat: -4.5296, lng: 136.8870 },
            { nama: "Merauke (MKQ) - Lanud J.A. Dimara", lat: -8.5208, lng: 140.4184 }
    ];

    let liveMissions = {};

    db.ref('missions').on('value', snap => {
        const data = snap.val();
        const listDiv = document.getElementById('flight-list');
        listDiv.innerHTML = "";
        
        // Clear existing
        Object.values(liveMissions).forEach(m => { map.removeLayer(m.marker); map.removeLayer(m.line); clearInterval(m.timer); });
        liveMissions = {};

        if (data) {
            Object.keys(data).forEach(id => {
                const v = data[id];
                listDiv.innerHTML += `<div style="padding:8px; margin-bottom:5px; border-left:4px solid ${v.warna}; background:#161b22; font-size:12px;"><b>${v.pesawat}</b><br>ETA: ${v.eta}</div>`;

                // Garis Rute
                const line = L.polyline([[v.lat, v.lng], [v.dLat, v.dLng]], {color: v.warna, weight: 1, dashArray: '5,5', opacity: 0.5}).addTo(map);

                // LOGIKA BEARING (Kunci Arah)
                const dy = v.dLat - v.lat;
                const dx = v.dLng - v.lng;
                const theta = Math.atan2(dy, dx);
                let angle = (theta * 180 / Math.PI); 
                // FontAwesome Plane menghadap 0 derajat (kanan/Timur) secara default di CSS
                // Tapi kita ingin dia menghadap "Atas" (Utara) sebagai 0 derajat
                const rotation = 90 - angle; 

                const marker = L.marker([v.lat, v.lng], {
                    icon: L.divIcon({
                        className: 'plane-wrapper',
                        html: `<div style="transform: rotate(${-rotation}deg);" class="rotated-plane">
                                 <i class="fa-solid fa-plane" style="color:${v.warna}; font-size:24px;"></i>
                               </div>
                               <div class="plane-label">${v.pesawat}</div>`,
                        iconSize: [30, 30],
                        iconAnchor: [15, 15]
                    })
                }).addTo(map);

                const takeoffTime = new Date(v.takeoff_manual).getTime();
                const totalDur = v.eet_min * 60000;

                const timer = setInterval(() => {
                    let progress = (Date.now() - takeoffTime) / totalDur;
                    if (progress < 0) progress = 0;
                    if (progress >= 1) { progress = 1; clearInterval(timer); }
                    
                    const nowLat = v.lat + (v.dLat - v.lat) * progress;
                    const nowLng = v.lng + (v.dLng - v.lng) * progress;
                    marker.setLatLng([nowLat, nowLng]);
                }, 1000);

                liveMissions[id] = { marker, line, timer };
            });
        }
    });

    function kirimMisi() {
        const asal = document.getElementById('asal').value.split('|');
        const tujuan = document.getElementById('tujuan').value.split('|');
        if(!asal[0] || !tujuan[0]) return;

        const dLat = parseFloat(tujuan[0]), dLng = parseFloat(tujuan[1]);
        const sLat = parseFloat(asal[0]), sLng = parseFloat(asal[1]);
        
        // Jarak sederhana
        const dist = Math.sqrt(Math.pow(dLat-sLat, 2) + Math.pow(dLng-sLng, 2)) * 111;
        const eet = Math.round((dist / parseInt(document.getElementById('tipe').value)) * 60);

        db.ref('missions').push({
            pesawat: document.getElementById('pesawat').value.toUpperCase(),
            takeoff_manual: document.getElementById('takeoff').value,
            warna: document.getElementById('warna').value,
            lat: sLat, lng: sLng, dLat: dLat, dLng: dLng,
            eet_min: eet,
            eta: new Date(new Date(document.getElementById('takeoff').value).getTime() + (eet * 60000)).toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'})
        });
    }

    // Init
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID', {hour12: false}); }, 1000);
    lanuds.forEach(l => {
        const opt = `<option value="${l.lat}|${l.lng}">${l.name}</option>`;
        document.getElementById('asal').innerHTML += opt;
        document.getElementById('tujuan').innerHTML += opt;
    });
    document.getElementById('takeoff').value = new Date(Date.now() - (new Date().getTimezoneOffset() * 60000)).toISOString().slice(0, 16);
</script>
</body>
</html>
