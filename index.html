<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kodal Logistik KORPASGAT - Ultimate Cloud Tracking</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #000; color: white; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 460px; background: #001f3f; display: flex; flex-direction: column; border-right: 3px solid #ff851b; z-index: 1000; }
        #map-container { flex: 1; position: relative; background: #000; }
        #map { height: 100%; width: 100%; background: #011425; }
        .header { background: #002d5a; padding: 20px; text-align: center; border-bottom: 3px solid #ff851b; }
        #clock-live { font-size: 2.2rem; font-weight: bold; font-family: monospace; color: #00ff00; text-shadow: 0 0 10px #00ff00; }
        .form-section { padding: 15px; background: #002244; overflow-y: auto; border-bottom: 1px solid #113355; flex-shrink: 0; max-height: 38vh; }
        .input-group { margin-bottom: 10px; display: flex; flex-direction: column; }
        input, select { padding: 10px; border-radius: 6px; border: 1px solid #ff851b; background: #001224; color: white; font-weight: bold; }
        button { cursor: pointer; }
        button.btn-tambah { background: #ff851b; color: white; border: none; padding: 15px; font-weight: bold; border-radius: 6px; width: 100%; font-size: 1.1rem; margin-top: 5px; }
        .list-section { flex: 1; overflow-y: auto; padding: 15px; }
        .flight-card { background: #002d5a; border-left: 6px solid; border-radius: 10px; padding: 15px; margin-bottom: 15px; position: relative; }
        .nav-time-panel { display: grid; grid-template-columns: 1fr 1fr 1fr; background: rgba(0,0,0,0.5); margin-top: 10px; border-radius: 5px; padding: 8px; border: 1px solid #113355; }
        .time-item { text-align: center; }
        .time-label { font-size: 0.65rem; color: #8cb4d6; display: block; font-weight: bold; }
        .time-val { font-family: monospace; color: #00ff00; font-weight: bold; font-size: 1rem; }
        .transit-alert { background: #ff851b; color: black; padding: 8px; text-align: center; font-weight: bold; margin-top: 10px; border-radius: 4px; animation: blink 1.5s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.6;} 100% {opacity: 1;} }
        .plane-wrapper { display: flex; flex-direction: column; align-items: center; position: relative; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="header">
            <h2 style="color:#ff851b; margin:0; font-size:1.2rem;">KODAL LOGISTIK KORPASGAT</h2>
            <div id="date-live">-- --- ----</div>
            <div id="clock-live">00:00:00</div>
        </div>

        <div class="form-section">
            <input type="hidden" id="edit_fbId" value="">
            <div class="input-group"><label>Misi / Logistik</label><input type="text" id="inp_barang" placeholder="Contoh: Amunisi"></div>
            <div class="input-group"><label>Personel On Board (POB)</label><input type="text" id="inp_kurir" placeholder="Nama Personel"></div>
            <div class="input-group"><label>Jenis & No Seri Pesawat</label><input type="text" id="inp_pesawat" placeholder="Contoh: A-1302"></div>
            <div class="input-group"><label>Jadwal Take Off (WIB)</label><input type="datetime-local" id="inp_waktu"></div>
            <div class="input-group"><label>Rute Navigasi</label>
                <select id="inp_asal"></select>
                <select id="inp_transit1"></select>
                <select id="inp_tujuan"></select>
            </div>
            <button class="btn-tambah" id="btn_submit" onclick="prosesTambahPenerbangan()">🚀 AKTIVASI MISI CLOUD</button>
        </div>
        <div class="list-section" id="flight-list"></div>
    </div>

    <div id="map-container"><div id="map"></div></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBifnBivkGMG827wJGXhIDtjZ5EHNNtLp8",
            authDomain: "kodal-logistik-korpasgat.firebaseapp.com",
            projectId: "kodal-logistik-korpasgat",
            databaseURL: "https://kodal-logistik-korpasgat-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const map = L.map('map').setView([-2.2, 118], 5);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        const daftarBandara = [
            { nama: "Jakarta (HLP)", lat: -6.2655, lng: 106.8906 },
            { nama: "Pekanbaru (PKU)", lat: 0.4611, lng: 101.4483 },
            { nama: "Medan (MES)", lat: 3.5623, lng: 98.6837 },
            { nama: "Ranai (NTX)", lat: 3.9453, lng: 108.3871 },
            { nama: "Pontianak (PNK)", lat: -0.1507, lng: 109.4039 }
        ];

        let flights = [];
        const SPEED = 540;

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2-lat1)*Math.PI/180;
            const dLon = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        db.ref('misi_logistik').on('value', snapshot => {
            flights.forEach(f => { if(f.marker) map.removeLayer(f.marker); if(f.line) map.removeLayer(f.line); });
            flights = [];
            const data = snapshot.val();
            if (data) {
                Object.keys(data).forEach(id => {
                    const f = data[id]; f.fbId = id;
                    initMarker(f); flights.push(f);
                });
            }
            renderSidebar();
        });

        function initMarker(f) {
            // Marker Pesawat Sesuai image_6b387a.png
            const markerHTML = `<div class="plane-wrapper">
                <div style="background:white; border-radius:50%; width:50px; height:50px; border:3px solid #007bff; display:flex; align-items:center; justify-content:center; color:black; font-weight:bold; font-size:1.2rem; box-shadow: 0 0 10px rgba(0,0,0,0.5);">
                    ${f.kurir.substring(0,2).toUpperCase()}
                </div>
                <div style="color:#0f0; font-weight:bold; font-family:monospace; font-size:1.1rem; text-shadow: 2px 2px 4px #000; margin-top:5px;">${f.pesawat}</div>
                <svg viewBox="0 0 100 100" width="35" id="svg-${f.fbId}" style="margin-top:5px;">
                    <path d="M50 5 L90 90 L50 70 L10 90 Z" fill="${f.warna}" stroke="#fff" stroke-width="3"/>
                </svg></div>`;

            const pos = f.rute[f.currentStep || 0];
            f.marker = L.marker([pos.lat, pos.lng], {
                icon: L.divIcon({ html: markerHTML, className: 'p-marker', iconSize:[60,100], iconAnchor:[30,50] })
            }).addTo(map);

            // GARIS RUTE DIPERBESAR (Sesuai Permintaan)
            f.line = L.polyline(f.rute.map(r=>[r.lat, r.lng]), {
                color: f.warna, 
                weight: 4,          // Lebih Tebal
                dashArray: '15, 20', // Putus-putus lebih renggang dan besar
                opacity: 0.8
            }).addTo(map);
        }

        async function prosesTambahPenerbangan() {
            const fbId = document.getElementById('edit_fbId').value;
            const ruteIds = ['inp_asal', 'inp_transit1', 'inp_tujuan'];
            const rute = [];
            ruteIds.forEach(id => {
                const val = document.getElementById(id).value;
                if (val) { const d = val.split(','); rute.push({ lat: parseFloat(d[0]), lng: parseFloat(d[1]), nama: d[2], rawVal: val }); }
            });

            // LOGIKA STATE-PRESERVING: JANGAN RISET PROGRESS SAAT EDIT
            let oldData = fbId ? flights.find(x => x.fbId === fbId) : null;

            const payload = {
                barang: document.getElementById('inp_barang').value,
                kurir: document.getElementById('inp_kurir').value,
                pesawat: document.getElementById('inp_pesawat').value,
                rute,
                depTimeStr: new Date(document.getElementById('inp_waktu').value).toISOString(),
                currentStep: oldData ? oldData.currentStep : 0,
                isWaiting: oldData ? oldData.isWaiting : true,
                etd: oldData ? oldData.etd : "--:--",
                eta: oldData ? oldData.eta : "--:--",
                eet: oldData ? oldData.eet : "--:--",
                lastTakeOffStr: oldData ? oldData.lastTakeOffStr : "",
                nextEtaStr: oldData ? oldData.nextEtaStr : "",
                warna: oldData ? oldData.warna : '#'+Math.floor(Math.random()*16777215).toString(16)
            };

            if (fbId) db.ref('misi_logistik/'+fbId).update(payload);
            else db.ref('misi_logistik').push(payload);
            resetForm();
        }

        function triggerTakeOff(id) {
            const f = flights.find(x => x.fbId === id);
            const now = new Date();
            const dist = calculateDistance(f.rute[f.currentStep].lat, f.rute[f.currentStep].lng, f.rute[f.currentStep+1].lat, f.rute[f.currentStep+1].lng);
            const hours = dist / SPEED;
            const nextEta = new Date(now.getTime() + (hours * 3600000));

            db.ref('misi_logistik/'+id).update({
                isWaiting: false,
                lastTakeOffStr: now.toISOString(),
                nextEtaStr: nextEta.toISOString(),
                etd: now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                eta: nextEta.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                eet: Math.round(hours*60) + "m"
            });
        }

        function renderSidebar() {
            const list = document.getElementById('flight-list'); list.innerHTML = "";
            flights.forEach(f => {
                const isLast = f.currentStep >= f.rute.length - 1;
                const ruteDisplay = f.rute.map((r, i) => `<span style="color:${i<=f.currentStep?'#0f0':'#fff'}">${r.nama}</span>`).join(' ➔ ');

                list.innerHTML += `
                <div class="flight-card" style="border-left-color:${f.warna}">
                    <div style="position:absolute; top:10px; right:10px;">
                        <button onclick="editMisi('${f.fbId}')" style="background:none; border:none; color:#ffc107; font-size:1.2rem;"><i class="fa-solid fa-pen-to-square"></i></button>
                        <button onclick="hapusMisi('${f.fbId}')" style="background:none; border:none; color:#ff4d4d; font-size:1.2rem; margin-left:10px;"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                    <div style="font-size:0.85rem; font-weight:bold; margin-bottom:10px; padding-right:60px;">${ruteDisplay}</div>
                    <div style="display:flex; align-items:center; gap:15px;">
                        <div style="background:white; border-radius:50%; width:60px; height:60px; border:3px solid #007bff; display:flex; align-items:center; justify-content:center; color:black; font-weight:bold; font-size:1.2rem;">
                            ${f.kurir.substring(0,2).toUpperCase()}
                        </div>
                        <div>
                            <div style="font-weight:bold; color:#ff851b; font-size:1.1rem;">${f.barang}</div>
                            <div style="font-size:0.9rem;">${f.kurir} - <span style="color:#0f0">${f.pesawat}</span></div>
                        </div>
                    </div>
                    <div class="nav-time-panel">
                        <div class="time-item"><span class="time-label">ETD</span><span class="time-val">${f.etd}</span></div>
                        <div class="time-item"><span class="time-label">EET</span><span class="time-val">${f.eet}</span></div>
                        <div class="time-item"><span class="time-label">ETA</span><span class="time-val">${f.eta}</span></div>
                    </div>
                    ${!isLast && f.isWaiting ? `<button class="btn-tambah" style="background:#00ff00;color:black" onclick="triggerTakeOff('${f.fbId}')">🛫 TAKE OFF SELANJUTNYA</button>` : ''}
                    <button class="btn-tambah" style="background:#007bff; padding:10px; font-size:0.9rem;" onclick="map.setView([${f.marker.getLatLng().lat},${f.marker.getLatLng().lng}], 8)">🎯 FOCUS PESAWAT</button>
                </div>`;
            });
        }

        setInterval(() => {
            const now = new Date();
            document.getElementById('clock-live').innerText = now.toLocaleTimeString('id-ID');
            document.getElementById('date-live').innerText = now.toLocaleDateString('id-ID', {day:'2-digit', month:'long', year:'numeric'});
            
            flights.forEach(f => {
                if (f.isWaiting || f.currentStep >= f.rute.length - 1) return;
                const start = new Date(f.lastTakeOffStr);
                const end = new Date(f.nextEtaStr);
                if (now >= end) {
                    db.ref('misi_logistik/'+f.fbId).update({ isWaiting: true, currentStep: f.currentStep + 1 });
                } else {
                    const progress = (now - start) / (end - start);
                    const p1 = f.rute[f.currentStep]; const p2 = f.rute[f.currentStep+1];
                    const lat = p1.lat + (p2.lat - p1.lat) * progress;
                    const lng = p1.lng + (p2.lng - p1.lng) * progress;
                    f.marker.setLatLng([lat, lng]);
                    
                    const svg = document.getElementById(`svg-${f.fbId}`);
                    if(svg) {
                        const angle = Math.atan2(p2.lng - p1.lng, p2.lat - p1.lat) * 180 / Math.PI;
                        svg.style.transform = `rotate(${angle}deg)`;
                    }
                }
            });
        }, 1000);

        function editMisi(id) {
            const f = flights.find(x => x.fbId === id);
            document.getElementById('edit_fbId').value = f.fbId;
            document.getElementById('inp_barang').value = f.barang;
            document.getElementById('inp_kurir').value = f.kurir;
            document.getElementById('inp_pesawat').value = f.pesawat;
            const dt = new Date(f.depTimeStr);
            dt.setMinutes(dt.getMinutes() - dt.getTimezoneOffset());
            document.getElementById('inp_waktu').value = dt.toISOString().slice(0,16);
            const ids = ['inp_asal', 'inp_transit1', 'inp_tujuan'];
            ids.forEach((id, i) => { document.getElementById(id).value = f.rute[i] ? f.rute[i].rawVal : ""; });
            document.getElementById('btn_submit').innerText = "💾 UPDATE MISI CLOUD";
        }

        function resetForm() {
            document.getElementById('edit_fbId').value = "";
            document.getElementById('inp_barang').value = "";
            document.getElementById('inp_kurir').value = "";
            document.getElementById('inp_pesawat').value = "";
            document.getElementById('btn_submit').innerText = "🚀 AKTIVASI MISI CLOUD";
        }

        function hapusMisi(id) { if(confirm("Hapus misi logistik?")) db.ref('misi_logistik/'+id).remove(); }

        function isiDropdown() {
            const ids = ['inp_asal', 'inp_transit1', 'inp_tujuan'];
            ids.forEach(id => {
                const sel = document.getElementById(id);
                sel.innerHTML = '<option value="">-- Pilih Lokasi --</option>';
                daftarBandara.forEach(b => { sel.innerHTML += `<option value="${b.lat},${b.lng},${b.nama}">${b.nama}</option>`; });
            });
        }
        isiDropdown();
    </script>
</body>
</html>
