<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kodal Logistik KORPASGAT</title>
    
    <!-- Leaflet CSS & FontAwesome untuk Ikon Pesawat -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <!-- Firebase App & Database -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #000; color: #fff; display: flex; height: 100vh; overflow: hidden; }
        
        /* Panel Kiri */
        #sidebar { width: 380px; background: #001f3f; border-right: 3px solid #ff851b; display: flex; flex-direction: column; z-index: 1001; }
        .header { background: #002d5a; padding: 20px; text-align: center; border-bottom: 3px solid #ff851b; }
        .header h2 { margin: 0; font-size: 1.1rem; color: #ff851b; letter-spacing: 2px; }
        #clock { font-size: 2.2rem; font-weight: bold; font-family: 'Courier New', Courier, monospace; color: #00ff00; margin-top: 10px; }

        .form-container { padding: 15px; overflow-y: auto; flex: 1; }
        .field { margin-bottom: 12px; }
        .field label { display: block; font-size: 0.7rem; font-weight: bold; color: #8cb4d6; margin-bottom: 4px; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; background: #001224; border: 1px solid #ff851b; color: white; border-radius: 4px; font-weight: bold; }
        
        .btn-aktivasi { width: 100%; padding: 15px; background: #ff851b; color: white; border: none; font-weight: bold; font-size: 1rem; cursor: pointer; border-radius: 4px; transition: 0.3s; margin-top: 10px; }
        .btn-aktivasi:hover { background: #e67616; }

        /* Area Peta */
        #map { flex: 1; position: relative; }

        /* Marker Pesawat */
        .plane-icon-div { text-align: center; white-space: nowrap; }
        .plane-tag { background: rgba(0, 255, 0, 0.9); color: black; padding: 2px 6px; border-radius: 4px; font-weight: bold; font-family: monospace; font-size: 11px; display: block; margin-bottom: 2px; border: 1px solid white; }
        
        /* List Misi Aktif */
        #mission-list { background: #00142a; padding: 10px; max-height: 200px; overflow-y: auto; border-top: 1px solid #113355; }
        .card { background: #002d5a; border-left: 5px solid #ff851b; padding: 10px; margin-bottom: 8px; font-size: 0.85rem; position: relative; }
        .btn-del { position: absolute; right: 10px; top: 10px; background: none; border: none; color: #ff4d4d; cursor: pointer; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="header">
            <h2>KODAL LOGISTIK KORPASGAT</h2>
            <div id="clock">00:00:00</div>
        </div>

        <div class="form-container">
            <div class="field"><label>Misi / Muatan</label><input type="text" id="misi" value="AMUNISI"></div>
            <div class="field"><label>Personel On Board (POB)</label><input type="text" id="pob" value="ANAS"></div>
            <div class="field"><label>Jenis & No Seri Pesawat</label><input type="text" id="pesawat" value="A-1234"></div>
            
            <div style="background: rgba(255,133,27,0.1); padding: 10px; border-radius: 4px; margin-top: 15px;">
                <label style="color:#ff851b; font-size: 11px; font-weight: bold;">RUTE OPERASI</label>
                <div class="field" style="margin-top:8px;"><select id="asal"></select></div>
                <div class="field"><select id="tujuan"></select></div>
            </div>

            <button class="btn-aktivasi" onclick="kirimData()">🚀 AKTIVASI MISI RADAR</button>
        </div>

        <div id="mission-list">
            <div style="font-size: 10px; color: #8cb4d6; margin-bottom: 5px;">MISI TERPANTAU:</div>
            <div id="list-misi"></div>
        </div>
    </div>

    <div id="map"></div>

    <script>
        // Konfigurasi Database
        const firebaseConfig = {
            apiKey: "AIzaSyBifnBivkGMG827wJGXhIDtjZ5EHNNtLp8",
            authDomain: "kodal-logistik-korpasgat.firebaseapp.com",
            projectId: "kodal-logistik-korpasgat",
            storageBucket: "kodal-logistik-korpasgat.firebasestorage.app",
            messagingSenderId: "533092732764",
            appId: "1:533092732764:web:ac77a04f83a12e69667b99",
            databaseURL: "https://kodal-logistik-korpasgat-default-rtdb.firebaseio.com"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Setup Peta
        const map = L.map('map', { zoomControl: false }).setView([-2.2, 118], 5);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        const bandara = [
            { n: "Lanud HLP (Jakarta)", lat: -6.2655, lng: 106.8906 },
            { n: "Lanud DMB (Balikpapan)", lat: -1.2683, lng: 116.8944 },
            { n: "Lanud IWI (Madiun)", lat: -7.6158, lng: 111.4338 },
            { n: "Lanud HND (Makassar)", lat: -5.0616, lng: 119.5539 },
            { n: "Lanud MUN (Biak)", lat: -1.1911, lng: 136.1086 },
            { n: "Lanud SIM (Aceh)", lat: 5.5239, lng: 95.4197 }
        ];

        let markersAktif = {};

        // Sinkronisasi Real-time
        db.ref('misi_logistik').on('value', (snapshot) => {
            const data = snapshot.val();
            
            // Hapus semua marker lama sebelum gambar ulang
            Object.values(markersAktif).forEach(m => {
                map.removeLayer(m.icon);
                map.removeLayer(m.path);
            });
            markersAktif = {};
            
            if(data) {
                Object.keys(data).forEach(id => {
                    renderPesawat(id, data[id]);
                });
            }
            updateListUI(data);
        });

        function renderPesawat(id, d) {
            const pos = [d.lat, d.lng];
            
            // Desain Ikon Pesawat
            const iconHTML = L.divIcon({
                className: 'plane-marker',
                html: `<div class="plane-icon-div">
                        <span class="plane-tag">${d.pesawat}</span>
                        <i class="fa-solid fa-plane" style="color:${d.warna}; font-size:26px; transform: rotate(45deg); text-shadow: 2px 2px 5px black;"></i>
                       </div>`,
                iconSize: [40, 40],
                iconAnchor: [20, 20]
            });

            const marker = L.marker(pos, { icon: iconHTML }).addTo(map);
            const ruteLine = L.polyline([[d.lat, d.lng], [d.destLat, d.destLng]], {
                color: d.warna, weight: 2, dashArray: '10, 10', opacity: 0.6
            }).addTo(map);

            markersAktif[id] = { icon: marker, path: ruteLine };
        }

        function kirimData() {
            const sAsal = document.getElementById('asal').value.split('|');
            const sTujuan = document.getElementById('tujuan').value.split('|');

            if(!sAsal[0] || !sTujuan[0]) { alert("Tentukan rute!"); return; }

            const payload = {
                misi: document.getElementById('misi').value,
                pob: document.getElementById('pob').value,
                pesawat: document.getElementById('pesawat').value,
                lat: parseFloat(sAsal[0]),
                lng: parseFloat(sAsal[1]),
                destLat: parseFloat(sTujuan[0]),
                destLng: parseFloat(sTujuan[1]),
                warna: '#' + Math.floor(Math.random()*16777215).toString(16)
            };

            db.ref('misi_logistik').push(payload);
            map.flyTo([payload.lat, payload.lng], 7);
        }

        function updateListUI(data) {
            const container = document.getElementById('list-misi');
            container.innerHTML = "";
            if(!data) return;
            Object.keys(data).forEach(id => {
                const f = data[id];
                container.innerHTML += `<div class="card" style="border-color:${f.warna}">
                    <b>${f.misi}</b><br>
                    <small>${f.pesawat} | ${f.pob}</small>
                    <button class="btn-del" onclick="hapusMisi('${id}')"><i class="fa-solid fa-trash"></i></button>
                </div>`;
            });
        }

        function hapusMisi(id) { db.ref('misi_logistik/' + id).remove(); }

        // Inisialisasi Jam & Dropdown
        function init() {
            const a = document.getElementById('asal');
            const t = document.getElementById('tujuan');
            [a, t].forEach(sel => {
                sel.innerHTML = `<option value="">-- Pilih Lokasi --</option>`;
                bandara.forEach(b => {
                    sel.innerHTML += `<option value="${b.lat}|${b.lng}">${b.n}</option>`;
                });
            });

            setInterval(() => {
                document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID');
            }, 1000);
        }
        init();
    </script>
</body>
</html>
