<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kodal Logistik KORPASGAT - Multi-Radar</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body { margin: 0; padding: 0; display: flex; height: 100vh; background: #000; overflow: hidden; color: #fff; font-family: 'Consolas', monospace; }
        #sidebar { width: 400px; background: #001f3f; border-right: 3px solid #ff851b; z-index: 2000; display: flex; flex-direction: column; }
        .header { background: #002d5a; padding: 10px; text-align: center; border-bottom: 3px solid #ff851b; }
        #clock { font-size: 1.8rem; color: #00ff00; text-shadow: 0 0 10px #00ff00; }
        
        .form-container { padding: 12px; border-bottom: 2px solid #ff851b; background: rgba(0,0,0,0.2); }
        .field { margin-bottom: 8px; }
        label { display: block; font-size: 10px; color: #ff851b; font-weight: bold; margin-bottom: 2px; }
        input, select { width: 100%; padding: 8px; background: #001224; border: 1px solid #334d66; color: white; font-weight: bold; font-size: 12px; }
        input:focus, select:focus { border-color: #ff851b; outline: none; }
        
        .btn-aktivasi { width: 100%; padding: 12px; background: #ff851b; color: white; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; font-size: 14px; transition: 0.3s; }
        .btn-aktivasi:hover { background: #ffaa56; box-shadow: 0 0 15px rgba(255,133,27,0.5); }
        
        #map { flex: 1; background: #011425; }

        /* Multi-Flight Dashboard */
        #flight-list { flex: 1; overflow-y: auto; padding: 10px; background: #00142a; }
        .flight-card { background: #002d5a; border-left: 5px solid #00ff00; padding: 10px; margin-bottom: 10px; border-radius: 4px; position: relative; font-size: 11px; }
        .flight-card.arrived { border-left-color: #ff4136; opacity: 0.8; }
        .card-title { font-weight: bold; color: #ff851b; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .btn-del { color: #ff4136; cursor: pointer; background: none; border: none; font-size: 14px; }

        .plane-div { text-align: center; width: 100px !important; }
        .plane-label { background: rgba(0, 0, 0, 0.8); color: #00ff00; padding: 2px 5px; border-radius: 3px; font-size: 10px; font-weight: bold; border: 1px solid #00ff00; display: inline-block; white-space: nowrap; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="header">
            <h2 style="margin:0; font-size:0.8rem; color:#ff851b;">SISTEM KODAL LOGISTIK MULTI-RADAR</h2>
            <div id="clock">00:00:00</div>
        </div>
        
        <div class="form-container">
            <div class="field"><label>CALLSIGN PESAWAT</label><input type="text" id="pesawat" placeholder="A-1341 / C-130"></div>
            <div class="field"><label>MUATAN / MISI</label><input type="text" id="misi" placeholder="BEKAL ULANG"></div>
            <div style="display:flex; gap:5px;">
                <div class="field" style="flex:1;"><label>TYPE</label>
                    <select id="tipe">
                        <option value="450">CN-235</option>
                        <option value="540">C-130</option>
                        <option value="800">B-737</option>
                    </select>
                </div>
                <div class="field" style="flex:1;"><label>WARNA RADAR</label><input type="color" id="warna" value="#00ff00"></div>
            </div>
            <div class="field"><label>ORIGIN (DEP)</label><select id="asal"></select></div>
            <div class="field"><label>DESTINATION (ARR)</label><select id="tujuan"></select></div>
            <button class="btn-aktivasi" onclick="kirimMisi()">🚀 AKTIVASI MISI BARU</button>
        </div>

        <div id="flight-list">
            <!-- List penerbangan akan muncul di sini -->
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBifnBivkGMG827wJGXhIDtjZ5EHNNtLp8",
            authDomain: "kodal-logistik-korpasgat.firebaseapp.com",
            projectId: "kodal-logistik-korpasgat",
            databaseURL: "https://kodal-logistik-korpasgat-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const map = L.map('map', { zoomControl: false }).setView([-2.5, 118], 5);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        const pangkalan = [
            { name: "Lanud HLP (Jakarta)", lat: -6.265, lng: 106.890 },
            { name: "Lanud DMB (Balikpapan)", lat: -1.268, lng: 116.894 },
            { name: "Lanud HND (Makassar)", lat: -5.061, lng: 119.553 },
            { name: "Lanud MUN (Biak)", lat: -1.191, lng: 136.108 },
            { name: "Lanud SRI (Manado)", lat: 1.549, lng: 124.926 },
            { name: "Lanud SUP (Pontianak)", lat: -0.151, lng: 109.403 }
        ];

        let activeFlights = {};

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2-lat1) * Math.PI / 180;
            const dLon = (lon2-lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        db.ref('multi_radar').on('value', (snap) => {
            const data = snap.val();
            const listDiv = document.getElementById('flight-list');
            listDiv.innerHTML = "";

            // Hapus semua layer lama
            Object.values(activeFlights).forEach(f => { map.removeLayer(f.marker); map.removeLayer(f.line); clearInterval(f.interval); });
            activeFlights = {};

            if(data) {
                Object.keys(data).forEach(id => {
                    const v = data[id];
                    const elapsed = Date.now() - v.takeoff_ts;
                    const duration = v.eet_min * 60000;
                    const progress = Math.min(elapsed / duration, 1);
                    
                    // Style Card
                    const isArrived = progress >= 1;
                    listDiv.innerHTML += `
                        <div class="flight-card ${isArrived ? 'arrived' : ''}">
                            <div class="card-title">
                                <span>✈️ ${v.pesawat}</span>
                                <button class="btn-del" onclick="hapusMisi('${id}')"><i class="fa-solid fa-trash"></i></button>
                            </div>
                            <b>TAKE OFF:</b> ${v.tanggal} | ${v.jam}<br>
                            <b>MISI:</b> ${v.misi}<br>
                            <b>ETD/ETA:</b> ${v.jam} / ${v.eta}<br>
                            <b style="color:${v.warna}">STATUS: ${isArrived ? 'LANDED' : 'EN-ROUTE'}</b>
                        </div>
                    `;

                    // Gambar di Peta
                    const line = L.polyline([[v.lat, v.lng], [v.dLat, v.dLng]], {color: v.warna, weight: 2, dashArray: '5,10'}).addTo(map);
                    const icon = L.divIcon({
                        className: 'plane-marker',
                        html: `<div class="plane-div">
                                <div class="plane-label" style="border-color:${v.warna}">${v.pesawat}</div>
                                <i class="fa-solid fa-plane" style="color:${v.warna}; font-size:22px; text-shadow: 2px 2px #000;"></i>
                               </div>`
                    });
                    const marker = L.marker([v.lat, v.lng], {icon: icon}).addTo(map);

                    // Animasi Pergerakan
                    const interval = setInterval(() => {
                        const now = Date.now();
                        const curProgress = Math.min((now - v.takeoff_ts) / duration, 1);
                        const cLat = v.lat + (v.dLat - v.lat) * curProgress;
                        const cLng = v.lng + (v.dLng - v.lng) * curProgress;
                        marker.setLatLng([cLat, cLng]);
                        
                        const angle = Math.atan2(v.dLat - v.lat, v.dLng - v.lng) * 180 / Math.PI;
                        const iconEl = marker.getElement()?.querySelector('.fa-plane');
                        if(iconEl) iconEl.style.transform = `rotate(${angle}deg)`;

                        if(curProgress >= 1) clearInterval(interval);
                    }, 1000);

                    activeFlights[id] = { marker, line, interval };
                });
            }
        });

        function kirimMisi() {
            const a = document.getElementById('asal').value.split('|');
            const t = document.getElementById('tujuan').value.split('|');
            const pesawat = document.getElementById('pesawat').value;
            if(!a[0] || !t[0] || !pesawat) return alert("Data Belum Lengkap!");

            const dist = getDistance(parseFloat(a[0]), parseFloat(a[1]), parseFloat(t[0]), parseFloat(t[1]));
            const eetMin = Math.round((dist / parseInt(document.getElementById('tipe').value)) * 60);
            
            const now = new Date();
            const eta = new Date(now.getTime() + (eetMin * 60000));

            const payload = {
                pesawat: pesawat,
                misi: document.getElementById('misi').value || "LOGISTIK",
                warna: document.getElementById('warna').value,
                lat: parseFloat(a[0]), lng: parseFloat(a[1]),
                dLat: parseFloat(t[0]), dLng: parseFloat(t[1]),
                tanggal: now.toLocaleDateString('id-ID', {weekday:'short', day:'numeric', month:'short'}),
                jam: now.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}),
                takeoff_ts: Date.now(),
                eet_min: eetMin,
                eta: eta.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'})
            };

            db.ref('multi_radar').push(payload);
        }

        function hapusMisi(id) {
            if(confirm("Hapus Misi Penerbangan Ini?")) db.ref('multi_radar/'+id).remove();
        }

        function init() {
            ['asal', 'tujuan'].forEach(id => {
                const sel = document.getElementById(id);
                sel.innerHTML = '<option value="">-- PILIH LANUD --</option>';
                pangkalan.forEach(p => sel.innerHTML += `<option value="${p.lat}|${p.lng}">${p.name}</option>`);
            });
            setInterval(() => { 
                const now = new Date();
                document.getElementById('clock').innerText = now.toLocaleTimeString('id-ID'); 
            }, 1000);
            setTimeout(() => map.invalidateSize(), 500);
        }
        init();
    </script>
</body>
</html>
