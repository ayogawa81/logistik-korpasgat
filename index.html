<html lang="id">
<head>

    <style>
        :root { --pencet: #ff851b; --bunker-gelap: #0a0e14; --panel-taktis: #161b22; }
        body { margin: 0; padding: 0; display: flex; height: 100vh; background: var(--bunker-gelap); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        #markas-kiri { width: 380px; background: var(--panel-taktis); border-right: 1px solid #30363d; z-index: 2000; display: flex; flex-direction: column; box-shadow: 4px 0 10px rgba(0,0,0,0.5); }
        .kop-surat { background: #010409; padding: 15px; text-align: center; border-bottom: 2px solid var(--pencet); }
        #jam-komsat { font-size: 1.6rem; color: #00ff00; font-family: 'Courier New', monospace; font-weight: bold; letter-spacing: 2px; }
        
        .kotak-input { padding: 15px; overflow-y: auto; background: #0d1117; border-bottom: 1px solid #30363d; }
        .isinya { margin-bottom: 12px; }
        label { display: block; font-size: 10px; color: var(--pencet); text-transform: uppercase; font-weight: bold; margin-bottom: 4px; }
        input, select { width: 100%; padding: 10px; background: #161b22; border: 1px solid #30363d; color: #fff; border-radius: 4px; font-size: 13px; box-sizing: border-box; }
        input:focus { border-color: var(--pencet); outline: none; }
        
        .tombol-pencet { width: 100%; padding: 14px; background: var(--pencet); color: #fff; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; text-transform: uppercase; transition: 0.2s; }
        .tombol-pencet:hover { background: #e67700; filter: brightness(1.1); }

        #daftar-pesawat { flex: 1; overflow-y: auto; padding: 12px; background: #010409; }
        .kartu-misi { background: #161b22; border-radius: 6px; padding: 12px; margin-bottom: 12px; border-left: 4px solid var(--pencet); position: relative; border: 1px solid #30363d; font-size: 12px; }
        .pangkat-pesawat { color: var(--pencet); font-weight: bold; font-size: 14px; }
        .status-misi { background: #238636; color: #fff; padding: 2px 8px; border-radius: 10px; font-size: 9px; font-weight: bold; float: right; }

        /* Map UI */
        #peta-ops { flex: 1; background: #000; }
        .wrapper-burung { text-align: center; }
        .label-pesawat { 
            background: rgba(0,0,0,0.85); color: #fff; padding: 2px 6px; border-radius: 3px; font-size: 11px; 
            border: 1px solid var(--pencet); white-space: nowrap; margin-bottom: 5px; font-weight: bold;
            display: inline-block; box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div id="markas-kiri">
    <div class="kop-surat">
        <div style="font-size: 0.7rem; color: var(--pencet); margin-bottom: 5px;">KORPASGAT TACTICAL RADAR V5 - SWA BHUWANA PAKSA</div>
        <div id="jam-komsat">00:00:00</div>
    </div>
    
    <div class="kotak-input">
        <div style="display:flex; gap:8px;">
            <div class="isinya" style="flex:2;"><label>Panggilan (Callsign)</label><input type="text" id="burung" placeholder="CN-235"></div>
            <div class="isinya" style="flex:1;"><label>Nyawa (POB)</label><input type="number" id="nyawa" value="1"></div>
        </div>
        <div class="isinya"><label>Jam Berangkat (LMT)</label><input type="datetime-local" id="jam_terbang"></div>
        <div class="isinya"><label>Isi Perut (Muatan)</label><input type="text" id="makanan" placeholder="Logistik Tempur"></div>
        
        <div style="display:flex; gap:8px;">
            <div class="isinya" style="flex:1;"><label>Jenis Burung</label>
                <select id="jenis_burung">
                    <option value="450">CN-235 (Ngebut)</option>
                    <option value="540">C-130 (Kelelawar)</option>
                </select>
            </div>
            <div class="isinya" style="flex:1;"><label>Warna Radar</label><input type="color" id="cat_burung" value="#ff851b"></div>
        </div>
        <div class="isinya">
            <label>Jalur Operasi (Origin - Destination)</label>
            <div style="display:flex; gap:5px;">
                <select id="bunker_start" style="flex:1;"></select>
                <select id="bunker_finish" style="flex:1;"></select>
            </div>
        </div>
        <button class="tombol-pencet" id="main-btn" onclick="terbangkanPesawat()">🚀 Kirim Misi</button>
    </div>

    <div id="daftar-pesawat"></div>
</div>

<div id="peta-ops"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Konfigurasi Database - Monitor Terpusat
    const firebaseConfig = { databaseURL: "https://kodal-logistik-korpasgat-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Peta Satelit stabil
    const peta_ops = L.map('peta-ops', { zoomControl: false }).setView([-2.5, 118], 5);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(peta_ops);

    const daftar_bunker = [
       { nama: "Sabang (SBG) - Lanud Maimun Saleh", lat: 5.8753, lng: 95.3375 },
            { nama: "Banda Aceh (BTJ) - Sultan Iskandar Muda", lat: 5.5239, lng: 95.4197 },
            { nama: "Medan (MES) - Lanud Soewondo", lat: 3.5623, lng: 98.6837 },
            { nama: "Pekanbaru (PKU) - Lanud Roesmin Nurjadin", lat: 0.4611, lng: 101.4483 },
            { nama: "Ranai (NTX) - Lanud Raden Sadjad (Natuna)", lat: 3.9453, lng: 108.3871 },
            { nama: "Palembang (PLM) - Lanud Sri Mulyono Herlambang", lat: -2.8981, lng: 104.7001 },
            { nama: "Jakarta (HLP) - Lanud Halim Perdanakusuma", lat: -6.2655, lng: 106.8906 },
            { nama: "Bandung (BDO) - Lanud Husein Sastranegara", lat: -6.9009, lng: 107.5768 },
            { nama: "Madiun (IWX) - Lanud Iswahjudi", lat: -7.6158, lng: 111.4338 },
            { nama: "Malang (MLG) - Lanud Abdul Rachman Saleh", lat: -7.9264, lng: 112.7135 },
            { nama: "Pontianak (PNK) - Lanud Supadio", lat: -0.1507, lng: 109.4039 },
            { nama: "Balikpapan (BPN) - Lanud Dhomber", lat: -1.2683, lng: 116.8944 },
            { nama: "Tarakan (TRK) - Lanud Anang Busra", lat: 3.3262, lng: 117.5647 },
            { nama: "Makassar (UPG) - Lanud Sultan Hasanuddin", lat: -5.0616, lng: 119.5539 },
            { nama: "Manado (MDC) - Lanud Sam Ratulangi", lat: 1.5492, lng: 124.9268 },
            { nama: "Denpasar (DPS) - Ngurah Rai", lat: -8.7481, lng: 115.1671 },
            { nama: "Kupang (KOE) - Lanud El Tari", lat: -10.1705, lng: 123.6653 },
            { nama: "Ambon (AMQ) - Lanud Pattimura", lat: -3.7049, lng: 128.0890 },
            { nama: "Biak (BIK) - Lanud Manuhua", lat: -1.1911, lng: 136.1086 },
            { nama: "Jayapura (DJJ) - Lanud Silas Papare", lat: -2.5765, lng: 140.5158 },
            { nama: "Timika (TIM) - Lanud Yohanis Kapiyau", lat: -4.5296, lng: 136.8870 },
            { nama: "Merauke (MKQ) - Lanud J.A. Dimara", lat: -8.5208, lng: 140.4184 }
    ];

    let skuadronMisi = {};

    function hitungJarak(l1, b1, l2, b2) {
        const R = 6371;
        const dLintang = (l2-l1) * Math.PI/180;
        const dBujur = (b2-b1) * Math.PI/180;
        const a = Math.sin(dLintang/2)**2 + Math.cos(l1*Math.PI/180)*Math.cos(l2*Math.PI/180)*Math.sin(dBujur/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    database.ref('missions').on('value', snap => {
        const data = snap.val();
        const listBurung = document.getElementById('daftar-pesawat');
        listBurung.innerHTML = "";
        
        Object.values(skuadronMisi).forEach(s => { peta_ops.removeLayer(s.burung marker); peta_ops.removeLayer(s.jalur); clearInterval(s.timerMisi); });
        skuadronMisi = {};

        if(data) {
            Object.keys(data).forEach(id => {
                const b = data[id];
                const jamTakeoffTs = new Date(b.takeoff_manual).getTime();
                const durasiMisiMs = b.eet_min * 60000;
                
                listBurung.innerHTML += `<div class="kartu-misi" style="border-left-color:${b.warna}"><span class="status-misi">TERBANG</span><span class="pangkat-pesawat">${b.pesawat}</span><br><small>${b.misi}</small><br><div style="font-size:10px; color:#8b949e;">ETA: ${b.eta}</div></div>`;

                const jalur = L.polyline([[b.lat, b.lng], [b.dLat, b.dLng]], {color: b.warna, weight: 1, dashArray: '5,10', opacity: 0.5}).addTo(peta_ops);
                const mark Burung = L.marker([b.lat, b.lng], {
                    icon: L.divIcon({
                        className: 'wrapper-burung',
                        html: `<div><div class="label-pesawat">${b.pesawat}</div><br><i class="fa-solid fa-plane" style="color:${b.warna}; font-size:22px;"></i></div>`
                    })
                }).addTo(peta_ops);

                const timerMisi = setInterval(() => {
                    const progresiMisi = Math.min(Math.max((Date.now() - jamTakeoffTs) / durasiMisiMs, 0), 1);
                    mark Burung.setLatLng([b.lat + (b.dLat-b.lat)*progresiMisi, b.lng + (b.dLng-b.lng)*progresiMisi]);

                    // LOGIKA HEADING: Kunci arah moncong pesawat ke jalur putus-putus
                    const angleMisi = Math.atan2(b.dLat - b.lat, b.dLng - b.lng) * (180 / Math.PI);
                    const visual heading = 90 - angleMisi;
                    const iconEl = mark Burung.getElement()?.querySelector('.fa-plane');
                    if(iconEl) iconEl.style.transform = `rotate(${-visual heading}deg)`;

                    if(progresiMisi >= 1) clearInterval(timerMisi);
                }, 1000);

                skuadronMisi[id] = { mark Burung, jalur, timerMisi };
            });
        }
    });

    function terbangkanPesawat() {
        const bunker_a = document.getElementById('bunker_start').value.split('|');
        const bunker_b = document.getElementById('bunker_finish').value.split('|');
        if(!bunker_a[0] || !bunker_b[0]) return;

        const jarakTempuh = hitungJarak(parseFloat(bunker_a[0]), parseFloat(bunker_a[1]), parseFloat(bunker_b[0]), parseFloat(bunker_b[1]));
        const waktuTempuhMin = Math.round((jarakTempuh / parseInt(document.getElementById('jenis_burung').value)) * 60);
        const etaMisi = new Date(new Date(document.getElementById('jam_terbang').value).getTime() + (waktuTempuhMin * 60000));

        database.ref('missions').push({
            pesawat: document.getElementById('burung').value.toUpperCase() || "A-001",
            takeoff_manual: document.getElementById('jam_terbang').value,
            misi: document.getElementById('makanan').value || "LOGISTIK TAKTIS",
            warna: document.getElementById('cat_burung').value,
            lat: parseFloat(bunker_a[0]), lng: parseFloat(bunker_a[1]),
            dLat: parseFloat(bunker_b[0]), dLng: parseFloat(bunker_b[1]),
            eet_min: waktuTempuhMin,
            eta: etaMisi.toLocaleString('id-ID', {hour:'2-digit', minute:'2-digit', day:'numeric', month:'short'})
        });
    }

    function inisialisasiMarkas() {
        ['bunker_start', 'bunker_finish'].forEach(id => {
            const selectMarkas = document.getElementById(id);
            selectMarkas.innerHTML = '<option value="">-- PILIH BUNKER --</option>';
            daftar_bunker.forEach(b => selectMarkas.innerHTML += `<option value="${b.lintang}|${b.bujur}">${b.name}</option>`);
        });
        setInterval(() => { document.getElementById('jam-komsat').innerText = new Date().toLocaleTimeString('id-ID', {hour12: false}); }, 1000);
        const waktu_sekarang = new Date(); waktu_sekarang.setMinutes(waktu_sekarang.getMinutes() - waktu_sekarang.getTimezoneOffset());
        document.getElementById('jam_terbang').value = waktu_sekarang.toISOString().slice(0,16);
    }
    inisialisasiMarkas();
</script>
</body>

                const mark Burung = L.marker([b.lat, b.lng], {
                    icon: L.divIcon({
                        className: 'wrapper-burung',
                        html: `<div><div class="label-pesawat">${b.pesawat}</div><br><i class="fa-solid fa-plane" style="color:${b.warna}; font-size:22px;"></i></div>`
                    })
                }).addTo(peta_ops);

                const timerMisi = setInterval(() => {
                    const progresiMisi = Math.min(Math.max((Date.now() - jamTakeoffTs) / durasiMisiMs, 0), 1);
                    mark Burung.setLatLng([b.lat + (b.dLat-b.lat)*progresiMisi, b.lng + (b.dLng-b.lng)*progresiMisi]);

                    // LOGIKA HEADING: Kunci arah moncong pesawat ke jalur putus-putus
                    const angleMisi = Math.atan2(b.dLat - b.lat, b.dLng - b.lng) * (180 / Math.PI);
                    const visual heading = 90 - angleMisi;
                    const iconEl = mark Burung.getElement()?.querySelector('.fa-plane');
                    if(iconEl) iconEl.style.transform = `rotate(${-visual heading}deg)`;

                    if(progresiMisi >= 1) clearInterval(timerMisi);
                }, 1000);

                skuadronMisi[id] = { mark Burung, jalur, timerMisi };
            });
        }
    });

    function terbangkanPesawat() {
        const bunker_a = document.getElementById('bunker_start').value.split('|');
        const bunker_b = document.getElementById('bunker_finish').value.split('|');
        if(!bunker_a[0] || !bunker_b[0]) return;

        const jarakTempuh = hitungJarak(parseFloat(bunker_a[0]), parseFloat(bunker_a[1]), parseFloat(bunker_b[0]), parseFloat(bunker_b[1]));
        const waktuTempuhMin = Math.round((jarakTempuh / parseInt(document.getElementById('jenis_burung').value)) * 60);
        const etaMisi = new Date(new Date(document.getElementById('jam_terbang').value).getTime() + (waktuTempuhMin * 60000));

        database.ref('missions').push({
            pesawat: document.getElementById('burung').value.toUpperCase() || "A-001",
            takeoff_manual: document.getElementById('jam_terbang').value,
            misi: document.getElementById('makanan').value || "LOGISTIK TAKTIS",
            warna: document.getElementById('cat_burung').value,
            lat: parseFloat(bunker_a[0]), lng: parseFloat(bunker_a[1]),
            dLat: parseFloat(bunker_b[0]), dLng: parseFloat(bunker_b[1]),
            eet_min: waktuTempuhMin,
            eta: etaMisi.toLocaleString('id-ID', {hour:'2-digit', minute:'2-digit', day:'numeric', month:'short'})
        });
    }

    function inisialisasiMarkas() {
        ['bunker_start', 'bunker_finish'].forEach(id => {
            const selectMarkas = document.getElementById(id);
            selectMarkas.innerHTML = '<option value="">-- PILIH BUNKER --</option>';
            daftar_bunker.forEach(b => selectMarkas.innerHTML += `<option value="${b.lintang}|${b.bujur}">${b.name}</option>`);
        });
        setInterval(() => { document.getElementById('jam-komsat').innerText = new Date().toLocaleTimeString('id-ID', {hour12: false}); }, 1000);
        const waktu_sekarang = new Date(); waktu_sekarang.setMinutes(waktu_sekarang.getMinutes() - waktu_sekarang.getTimezoneOffset());
        document.getElementById('jam_terbang').value = waktu_sekarang.toISOString().slice(0,16);
    }
    inisialisasiMarkas();
</script>
