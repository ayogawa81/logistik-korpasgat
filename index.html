<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kodal Logistik KORPASGAT - Ultimate Cloud</title>
    
    <!-- CSS Load First -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #000; color: white; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 450px; background: #001f3f; display: flex; flex-direction: column; border-right: 3px solid #ff851b; z-index: 1000; }
        #map-container { flex: 1; position: relative; background: #011425; }
        #map { height: 100%; width: 100%; }
        .header { background: #002d5a; padding: 20px; text-align: center; border-bottom: 3px solid #ff851b; }
        .header h2 { margin: 0; color: #ff851b; text-transform: uppercase; letter-spacing: 2px; font-size: 1.2rem; }
        #clock-live { font-size: 2.5rem; font-weight: bold; font-family: monospace; color: #00ff00; text-shadow: 0 0 10px #00ff00; }
        #date-live { color: #fff; font-weight: bold; }
        .form-section { padding: 15px; background: #002244; overflow-y: auto; max-height: 45vh; border-bottom: 1px solid #113355; }
        .input-group { margin-bottom: 10px; display: flex; flex-direction: column; }
        .input-group label { font-size: 0.8rem; color: #8cb4d6; font-weight: bold; margin-bottom: 3px; }
        input, select { padding: 10px; border-radius: 6px; border: 1px solid #ff851b; background: #001224; color: white; font-weight: bold; }
        .btn-tambah { background: #ff851b; color: white; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 6px; width: 100%; font-size: 1.1rem; margin-top: 10px; }
        .list-section { flex: 1; overflow-y: auto; padding: 15px; background: #001f3f; }
        .flight-card { background: #002d5a; border-left: 6px solid; border-radius: 10px; padding: 15px; margin-bottom: 15px; position: relative; border: 1px solid #113355; }
        .card-main-body { display: flex; gap: 12px; align-items: center; }
        .card-main-body img { width: 55px; height: 55px; border-radius: 50%; border: 2px solid; object-fit: cover; }
        .plane-marker-icon { display: flex; flex-direction: column; align-items: center; }
        .plane-marker-icon img { width: 45px; height: 45px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 10px #000; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="header">
            <h2>KODAL LOGISTIK KORPASGAT</h2>
            <div id="date-live">-- --- ----</div>
            <div id="clock-live">00:00:00</div>
        </div>

        <div class="form-section">
            <input type="hidden" id="edit_fbId" value="">
            <div class="input-group"><label>Misi / Logistik</label><input type="text" id="inp_barang" placeholder="Nama Misi"></div>
            <div class="input-group"><label>Personel On Board</label><input type="text" id="inp_kurir" placeholder="Nama Lengkap"></div>
            <div class="input-group"><label>Pesawat & No Seri</label><input type="text" id="inp_pesawat" placeholder="Hercules / A-1301"></div>
            <div class="input-group"><label>Jadwal Take Off (WIB)</label><input type="datetime-local" id="inp_waktu"></div>
            
            <div class="input-group"><label>1. Asal</label><select id="inp_asal"></select></div>
            <div class="input-group"><label>2. Transit 1 (Opsional)</label><select id="inp_transit1"></select></div>
            <div class="input-group"><label>3. Transit 2 (Opsional)</label><select id="inp_transit2"></select></div>
            <div class="input-group"><label>4. Tujuan Akhir</label><select id="inp_tujuan"></select></div>
            
            <button class="btn-tambah" id="btn_submit" onclick="prosesData()">🚀 AKTIVASI MISI CLOUD</button>
        </div>

        <div class="list-section" id="flight-list"></div>
    </div>

    <div id="map-container"><div id="map"></div></div>

    <!-- Script Load Order is Critical -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // 1. Inisialisasi Firebase & Peta
        const firebaseConfig = {
            apiKey: "AIzaSyBifnBivkGMG827wJGXhIDtjZ5EHNNtLp8",
            databaseURL: "https://kodal-logistik-korpasgat-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const map = L.map('map').setView([-2.2, 118], 5);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        const bandara = [
            { n: "Jakarta (HLP) - Halim", lt: -6.2655, lg: 106.8906 },
            { n: "Madiun (IWX) - Iswahjudi", lt: -7.6158, lg: 111.4338 },
            { n: "Makassar (UPG) - Hasanuddin", lt: -5.0616, lg: 119.5539 },
            { n: "Biak (BIK) - Manuhua", lt: -1.1911, lg: 136.1086 },
            { n: "Balikpapan (BPN) - Dhomber", lt: -1.2683, lg: 116.8944 },
            { n: "Pontianak (PNK) - Supadio", lt: -0.1507, lg: 109.4039 }
        ];

        let flights = [];

        // 2. Sinkronisasi Jam (Memperbaiki jam 00:00:00 di gambar)
        setInterval(() => {
            const n = new Date();
            document.getElementById('clock-live').innerText = n.toLocaleTimeString('id-ID');
            document.getElementById('date-live').innerText = n.toLocaleDateString('id-ID', {day:'2-digit', month:'long', year:'numeric'});
        }, 1000);

        // 3. Dropdown Loader
        function loadDropdowns() {
            const ids = ['inp_asal', 'inp_transit1', 'inp_transit2', 'inp_tujuan'];
            ids.forEach(id => {
                const el = document.getElementById(id);
                el.innerHTML = '<option value="">-- Pilih Lokasi --</option>';
                bandara.forEach(b => {
                    el.innerHTML += `<option value="${b.lt},${b.lg},${b.n}">${b.n}</option>`;
                });
            });
        }
        loadDropdowns();

        // 4. Firebase Sync & Marker Logic
        db.ref('misi_logistik').on('value', (snap) => {
            flights.forEach(f => { if(f.marker) map.removeLayer(f.marker); });
            flights = [];
            const data = snap.val();
            const list = document.getElementById('flight-list');
            list.innerHTML = "";

            if (data) {
                Object.keys(data).forEach(id => {
                    const f = data[id]; f.fbId = id;
                    const pos = f.rute[0];
                    const icon = L.divIcon({
                        html: `<div class="plane-marker-icon"><img src="${f.fotoUrl}"><b style="color:#0f0">${f.pesawat}</b></div>`,
                        className: 'custom-div-icon', iconSize: [50, 70]
                    });
                    f.marker = L.marker([pos.lat, pos.lng], { icon: icon }).addTo(map);
                    flights.push(f);

                    list.innerHTML += `
                        <div class="flight-card" style="border-left-color:${f.warna || '#ff851b'}">
                            <div class="card-main-body">
                                <img src="${f.fotoUrl}" style="border-color:${f.warna || '#ff851b'}">
                                <div>
                                    <div style="font-weight:bold">${f.barang}</div>
                                    <small>${f.pesawat}</small>
                                </div>
                            </div>
                        </div>`;
                });
            }
        });

        // 5. Proses Simpan Data
        function prosesData() {
            const barang = document.getElementById('inp_barang').value;
            const waktu = document.getElementById('inp_waktu').value;
            if (!barang || !waktu) { alert("Lengkapi Misi dan Jadwal!"); return; }

            const rute = [];
            ['inp_asal', 'inp_transit1', 'inp_transit2', 'inp_tujuan'].forEach(id => {
                const v = document.getElementById(id).value;
                if(v) { 
                    const d = v.split(','); 
                    rute.push({ lat: parseFloat(d[0]), lng: parseFloat(d[1]), nama: d[2] }); 
                }
            });

            const payload = {
                barang, 
                kurir: document.getElementById('inp_kurir').value || "AU",
                pesawat: document.getElementById('inp_pesawat').value || "A-1301",
                fotoUrl: "https://ui-avatars.com/api/?name=" + barang,
                rute,
                waktu,
                warna: '#ff851b',
                currentStep: 0
            };

            db.ref('misi_logistik').push(payload).then(() => {
                alert("Misi Diaktifkan!");
                document.getElementById('inp_barang').value = "";
            });
        }
    </script>
</body>
</html>
